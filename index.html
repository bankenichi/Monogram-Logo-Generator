                        <>
                          <SliderRow label="Intensity" value={settings.effects.nameGlow.intensity}
                            min={0.2} max={3} step={0.1}
                            onChange={v => setEffect("nameGlow", "intensity", v)} />
                          <ColorPickerRow label="Name glow color" value={settings.effects.nameGlow.color}
                            onChange={v => setEffect("nameGlow", "color", v)} />
                        </>
                      )}
                    </Section>

                    <Section title="Name Shadow" sectionKey="effects_nameShadow" defaultOpen={false}>
                      <div className="toggle-row">
                        <label>Enable name shadow</label>
                        <button
                          className={`toggle ${settings.effects.nameShadow.enabled ? "on" : ""}`}
                          onClick={() => setEffect("nameShadow", "enabled", !settings.effects.nameShadow.enabled)}
                          aria-pressed={settings.effects.nameShadow.enabled}
                          aria-label="Toggle name shadow"
                        />
                      </div>
                      {settings.effects.nameShadow.enabled && (
                        <>
                          <SliderRow label="Offset X" value={settings.effects.nameShadow.dx}
                            min={-50} max={50} step={1}
                            onChange={v => setEffect("nameShadow", "dx", v)} unit="px" />
                          <SliderRow label="Offset Y" value={settings.effects.nameShadow.dy}
                            min={-50} max={50} step={1}
                            onChange={v => setEffect("nameShadow", "dy", v)} unit="px" />
                          <SliderRow label="Blur" value={settings.effects.nameShadow.blur}
                            min={0} max={40} step={1}
                            onChange={v => setEffect("nameShadow", "blur", v)} unit="px" />
                          <SliderRow label="Opacity" value={settings.effects.nameShadow.opacity}
                            min={0} max={1} step={0.05}
                            onChange={v => setEffect("nameShadow", "opacity", v)} />
                          <ColorPickerRow label="Name shadow color" value={settings.effects.nameShadow.color}
                            onChange={v => setEffect("nameShadow", "color", v)} />
                        </>
                      )}
                    </Section>
                  </>
                )}
                {tab === "randomizer" && (
                  <div className="randomizer-tab">
                    {isMobile && (
                    <Section title="Presets" sectionKey="presets" defaultOpen={false}>
                      {hasCustomized && !warnDismissed && (
                        <div className="preset-storage-warn">
                          <span>⚠</span> Custom presets are stored in browser storage. Export a preset bundle from the Export/Import tab to keep a backup.
                          <button className="warn-dismiss" onClick={() => setWarnDismissed(true)} aria-label="Dismiss warning">&times;</button>
                        </div>
                      )}
                      <div className="presets mobile-presets" role="list" aria-label="Design presets">
                        {presetSlots.map(slot => slot.name ? (
                          <div key={slot.slot} className="preset-slot-row">
                            <PresetThumb
                              preset={{ ...slot.settings, name: slot.name }}
                              active={settings.name === slot.name && settings.bgTop === slot.settings?.bgTop}
                              onClick={() => applyPreset(slot.settings)}
                              fontLoaded={fontLoaded}
                            />
                            {slot.isShipped && slot.modifiedAt !== null && (
                              <button className="slot-action-btn slot-reset-btn" onClick={() => handleResetSlotToShipped(slot.slot)} title={`Restore to shipped "${slot.originalName}"`}>↺</button>
                            )}
                            <button className="slot-action-btn slot-delete-btn" onClick={() => handleClearSlot(slot.slot)} title="Clear this slot">×</button>
                          </div>
                        ) : (
                          <div key={slot.slot} className="preset-slot-empty" aria-hidden="true">— Empty slot —</div>
                        ))}
                      </div>
                    </Section>
                    )}
                    <p className="export-desc">
                      Lock the categories you want to keep, then hit Randomize. Locked categories stay; everything else gets new values.
                    </p>
                    <div className="randomizer-locks">
                      {Object.keys(RANDOMIZER_CATEGORIES).map(cat => {
                        const uiState = loadUIState();
                        const isLocked = !!(uiState.randomizerLocks?.[cat]);
                        return (
                          <div key={cat} className="toggle-row">
                            <label>{RANDOMIZER_CATEGORY_LABELS[cat]}</label>
                            <button
                              type="button"
                              className={`toggle ${isLocked ? "on" : ""}`}
                              onClick={() => {
                                const next = loadUIState();
                                next.randomizerLocks = { ...(next.randomizerLocks || {}), [cat]: !isLocked };
                                try { localStorage.setItem(UI_STATE_KEY, JSON.stringify(next)); } catch {}
                                setRandomizerTick(t => t + 1);
                              }}
                              aria-pressed={isLocked}
                              aria-label={`Lock ${RANDOMIZER_CATEGORY_LABELS[cat]}`}
                            />
                          </div>
                        );
                      })}
                    </div>
                    {(() => {
                      const anyLocked = Object.keys(RANDOMIZER_CATEGORIES).some(cat => loadUIState().randomizerLocks?.[cat]);
                      return (
                        <button
                          type="button"
                          className="reset-locks-btn"
                          onClick={() => {
                            const next = loadUIState();
                            next.randomizerLocks = {};
                            try { localStorage.setItem(UI_STATE_KEY, JSON.stringify(next)); } catch {}
                            setRandomizerTick(t => t + 1);
                          }}
                          disabled={!anyLocked}
                          style={{
                            width: '100%', padding: '10px', marginTop: '12px',
                            background: 'rgba(255,255,255,0.04)',
                            border: '1px solid rgba(255,255,255,0.12)',
                            borderRadius: '8px',
                            color: anyLocked ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.3)',
                            fontFamily: "'Poppins', sans-serif", fontSize: '13px', fontWeight: '600',
                            cursor: anyLocked ? 'pointer' : 'not-allowed',
                            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
                            transition: 'all 0.2s ease'
                          }}
                          aria-label="Reset all category locks"
                        >
                          🔓 Reset Locks
                        </button>
                      );
                    })()}
                    <button
                      className="randomize-global-btn"
                      onClick={handleRandomize}
                      style={{
                        width: '100%', padding: '14px', marginTop: '12px',
                        background: 'rgba(255,200,40,0.06)',
                        border: '1px solid rgba(255,200,40,0.2)',
                        borderRadius: '8px', color: '#ffc828',
                        fontFamily: "'Poppins', sans-serif", fontSize: '14px', fontWeight: '600',
                        cursor: 'pointer', display: 'flex', alignItems: 'center',
                        justifyContent: 'center', gap: '8px', transition: 'all 0.2s ease'
                      }}
                      onMouseOver={(e) => e.currentTarget.style.background = 'rgba(255,200,40,0.12)'}
                      onMouseOut={(e) => e.currentTarget.style.background = 'rgba(255,200,40,0.06)'}
                    >
                      🎲 Randomize Design
                    </button>
                  </div>
                )}

                {tab === "export/import" && (
                  <>
                    {isMobile && (
                    <Section title="Presets" sectionKey="presets" defaultOpen={false}>
                      {hasCustomized && !warnDismissed && (
                        <div className="preset-storage-warn">
                          <span>⚠</span> Custom presets are stored in browser storage. Export a preset bundle from the Export/Import tab to keep a backup.
                          <button className="warn-dismiss" onClick={() => setWarnDismissed(true)} aria-label="Dismiss warning">&times;</button>
                        </div>
                      )}
                      <div className="presets mobile-presets" role="list" aria-label="Design presets">
                        {presetSlots.map(slot => slot.name ? (
                          <div key={slot.slot} className="preset-slot-row">
                            <PresetThumb
                              preset={{ ...slot.settings, name: slot.name }}
                              active={settings.name === slot.name && settings.bgTop === slot.settings?.bgTop}
                              onClick={() => applyPreset(slot.settings)}
                              fontLoaded={fontLoaded}
                            />
                            {slot.isShipped && slot.modifiedAt !== null && (
                              <button className="slot-action-btn slot-reset-btn" onClick={() => handleResetSlotToShipped(slot.slot)} title={`Restore to shipped "${slot.originalName}"`}>↺</button>
                            )}
                            <button className="slot-action-btn slot-delete-btn" onClick={() => handleClearSlot(slot.slot)} title="Clear this slot">×</button>
                          </div>
                        ) : (
                          <div key={slot.slot} className="preset-slot-empty" aria-hidden="true">— Empty slot —</div>
                        ))}
                      </div>
                    </Section>
                    )}
                    <Section title="Manage Presets" sectionKey="managePresets" defaultOpen={false}>
                      {hasCustomized && !warnDismissed && (
                        <div className="preset-storage-warn preset-storage-warn-lg">
                          <span>⚠</span>
                          <span>Your custom presets are stored in browser storage and will be lost if you clear your site data or history. Export a preset bundle now to keep a permanent backup.</span>
                          <button className="warn-dismiss" onClick={() => setWarnDismissed(true)} aria-label="Dismiss warning">&times;</button>
                        </div>
                      )}
                      <button className="btn btn-primary export-btn" onClick={exportPresets}>
                        <span className="btn-icon" aria-hidden="true">↓</span> Export all presets
                      </button>
                      <label className="btn btn-secondary export-btn" style={{cursor:"pointer"}}>
                        <span className="btn-icon" aria-hidden="true">↑</span> Import presets from file
                        <input type="file" accept=".json,application/json" style={{display:"none"}} onChange={importPresets} aria-label="Import preset bundle" />
                      </label>
                      {importPresetsError && <div className="import-error" role="alert">{importPresetsError}</div>}
                      {importPresetsSuccess && <div className="import-success" role="status">✓ Presets loaded successfully!</div>}
                      <div className="export-divider" />
                      <p className="export-desc">Choose a preset slot to save the current canvas state. Slots 1–6 are the shipped defaults — they can be freely replaced. Slots 7–10 are yours to fill.</p>
                      {!saveSlotMode ? (
                        <button className="btn btn-primary export-btn" onClick={() => { setSaveSlotMode(true); setSaveSlotName(settings.name || ""); setSelectedSlotIndex(null); setSaveSlotError(null); }}>
                          Save current design as preset
                        </button>
                      ) : (
                        <div className="slot-picker">
                          <div className="slot-picker-grid">
                            {presetSlots.map(slot => (
                              <button
                                key={slot.slot}
                                className={`slot-picker-item ${selectedSlotIndex === slot.slot ? "selected" : ""} ${slot.isShipped && slot.modifiedAt === null ? "is-default" : ""}`}
                                onClick={() => { setSelectedSlotIndex(slot.slot); setSaveSlotError(null); }}
                              >
                                <span className="slot-picker-num">{slot.slot + 1}</span>
                                <span className="slot-picker-name">{slot.name || "— empty —"}</span>
                                {slot.isShipped && slot.modifiedAt === null && <span className="slot-picker-badge">Default ★</span>}
                              </button>
                            ))}
                          </div>
                          {selectedSlotIndex !== null && (
                            <div className="save-slot-row">
                              <input
                                className="text-input"
                                value={saveSlotName}
                                onChange={e => { setSaveSlotName(e.target.value); setSaveSlotError(null); }}
                                onKeyDown={e => { if (e.key === "Enter") commitSaveToSlot(); if (e.key === "Escape") { setSaveSlotMode(false); setSelectedSlotIndex(null); setSaveSlotError(null); } }}
                                placeholder="Enter preset name..."
                                autoFocus
                              />
                              <div className="save-slot-btns">
                                <button className="btn btn-primary" onClick={commitSaveToSlot}>
                                  {presetSlots[selectedSlotIndex]?.name ? `Replace "${presetSlots[selectedSlotIndex].name}"` : "Save"}
                                </button>
                                <button className="btn btn-secondary" onClick={() => { setSaveSlotMode(false); setSelectedSlotIndex(null); setSaveSlotError(null); }}>Cancel</button>
                              </div>
                            </div>
                          )}
                          {saveSlotError && <div className="import-error" role="alert">{saveSlotError}</div>}
                        </div>
                      )}
                    </Section>
                    <Section title="Download" sectionKey="exportDownload">
                      <p className="export-desc">Export your monogram as a high-res PNG (raster) or scalable SVG (vector, ideal for logos).</p>
                      <div className="png-row">
                        <button className="btn btn-primary export-btn" onClick={downloadPNG}>
                          <span className="btn-icon" aria-hidden="true">↓</span> Download PNG <span className="res-label">{pngRes}×{pngRes}</span>
                        </button>
                        <select className="res-select" value={pngRes} onChange={e => setPngRes(Number(e.target.value))} aria-label="PNG resolution">
                          <option value={700}>1×</option>
                          <option value={1400}>2×</option>
                          <option value={2800}>4×</option>
                        </select>
                      </div>
                      <button className="btn btn-secondary export-btn" onClick={downloadSVG}>
                        <span className="btn-icon" aria-hidden="true">↓</span> Download SVG
                      </button>
                    </Section>
                    <Section title="Share" sectionKey="exportShare">
                      <p className="export-desc">Copy a URL with your full design encoded. Anyone with the link will see your exact settings.</p>
                      <button className="btn btn-share export-btn" onClick={shareURL}>
                        <span className="btn-icon" aria-hidden="true">⎘</span> Copy Share Link
                      </button>
                    </Section>
                    <Section title="Save / Load JSON" sectionKey="exportJson">
                      <p className="export-desc">Export your settings as JSON to back them up, or import a previously saved file.</p>
                      <button className="btn btn-primary export-btn" onClick={exportJSON}>
                        <span className="btn-icon" aria-hidden="true">↓</span> Export JSON
                      </button>
                      <label className="btn btn-import export-btn" style={{cursor:"pointer"}}>
                        <span className="btn-icon" aria-hidden="true">↑</span> Import JSON
                        <input type="file" accept=".json,application/json" style={{display:"none"}} onChange={importJSON} aria-label="Import JSON file" />
                      </label>
                      {importError && <div className="import-error" role="alert">{importError}</div>}
                      {importSuccess && <div className="import-success" role="status">✓ Design loaded successfully!</div>}
                    </Section>
                    <Section title="Current Settings" sectionKey="exportPreview" defaultOpen={false}>
                      <div className="json-preview" aria-label="Current settings JSON" tabIndex={0}>
                      {JSON.stringify(settings, null, 2).replace(/"([a-zA-Z0-9_]+)":/g, '$1:')}
                      </div>
                    </Section>
                  </>
                )}

                <a href="https://ko-fi.com/bankenichi" target="_blank" rel="noopener noreferrer" className="kofi-mobile" title="Support me on Ko-fi" aria-label="Support on Ko-fi">
                  <img src="https://raw.githubusercontent.com/bankenichi/Monogram-Logo-Generator/main/kofi%20logo.png" alt="Ko-fi" />
                </a>
              </div>
            </div>
          </div>

          {shareToast && (
            <div className="share-toast" role="status" aria-live="polite">
              ✓ Share link copied to clipboard!
            </div>
          )}
          {shareWarning && (
            <div className="share-warning" role="alert">
              <span>Link too long ({shareWarning.toLocaleString()} chars) — use JSON export instead.</span>
              <button className="warn-btn" onClick={() => { setShareWarning(null); exportJSON(); }}>Export JSON</button>
            </div>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
