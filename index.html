    const { useState, useRef, useEffect, useCallback } = React;

    // ── Debounce hook ──
    function useDebounce(value, delay) {
      const [debounced, setDebounced] = useState(value);
      useEffect(() => {
        const t = setTimeout(() => setDebounced(value), delay);
        return () => clearTimeout(t);
      }, [value, delay]);
      return debounced;
    }

    // ── UI state (collapsed sections, etc.) — per-device, distinct from design settings ──
    const UI_STATE_KEY = "monogram-studio-ui-state";
    function loadUIState() {
      try {
        const raw = localStorage.getItem(UI_STATE_KEY);
        if (raw) return JSON.parse(raw);
      } catch {}
      return {};
    }
    function useUIState() {
      const [state, setState] = useState(loadUIState);
      const update = useCallback((path, value) => {
        setState(prev => {
          const next = { ...prev };
          const [bucket, key] = path;
          next[bucket] = { ...(next[bucket] || {}), [key]: value };
          try { localStorage.setItem(UI_STATE_KEY, JSON.stringify(next)); } catch {}
          return next;
        });
      }, []);
      return [state, update];
    }

    // ── Collapsible section component ──
    function Section({ title, sectionKey, defaultOpen = false, children }) {
      const [uiState, updateUI] = useUIState();
      const stored = uiState.sections?.[sectionKey];
      const isOpen = stored === undefined ? defaultOpen : stored;
      const toggle = () => updateUI(["sections", sectionKey], !isOpen);
      return (
        <div className={`section section-collapsible ${isOpen ? "open" : "closed"}`}>
          <button
            type="button"
            className="section-header"
            onClick={toggle}
            aria-expanded={isOpen}
            aria-controls={`section-body-${sectionKey}`}
          >
            <span className="section-title">{title}</span>
            <span className="section-chevron" aria-hidden="true">{isOpen ? "▼" : "▶"}</span>
          </button>
          <div id={`section-body-${sectionKey}`} className="section-body" hidden={!isOpen}>
            {children}
          </div>
        </div>
      );
    }

    const PRESET_SLOTS_KEY = "monogram-studio-preset-slots";
    const TOTAL_PRESET_SLOTS = 10;
    const SHIPPED_SLOT_COUNT = 6;

    function persistSlots(slots) {
      try { localStorage.setItem(PRESET_SLOTS_KEY, JSON.stringify(slots)); } catch {}
    }

    function getOrInitSlots() {
      try {
        const raw = localStorage.getItem(PRESET_SLOTS_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length === TOTAL_PRESET_SLOTS && parsed[0]?.slot === 0) return parsed;
        }
      } catch {}
      const slots = [];
      for (let i = 0; i < TOTAL_PRESET_SLOTS; i++) {
        if (i < SHIPPED_SLOT_COUNT) {
          const p = SHIPPED_PRESETS[i];
          slots.push({ slot: i, name: p.name, settings: { ...p }, isShipped: true, originalName: p.name, modifiedAt: null });
        } else {
          slots.push({ slot: i, name: null, settings: null, isShipped: false, originalName: null, modifiedAt: null });
        }
      }
      persistSlots(slots);
      return slots;
    }

        shadow:     { enabled: true, dx: 4, dy: 4, blur: 8, color: "#000000", opacity: 0.5 },
        nameShadow: { enabled: true, dx: 3, dy: 3, blur: 6, color: "#000000", opacity: 0.5 },
        emboss:     { enabled: false, depth: 3, angle: 135, highlight: "#ffffff", shadow: "#000000", opacity: 0.6 }
      },
      // Letter transformations (F19)
      letterScaleX: 1.0,
      letterScaleY: 1.0,
      letterSkewX:  0,
      letterSkewY:  0,
      letterRotate: 0,
      // Blend mode (F16)
      letterBlendMode: "normal",
      letterOpacity: 1.0,
      // Layer stack (F17)
      layers: [
        { id: "background", label: "Background", visible: true },
        { id: "rings",      label: "Rings",      visible: true },
        { id: "bigLetter",  label: "Big Letter",  visible: true },
        { id: "name",       label: "Name",        visible: true },
      ],
      texture: "none",
    };

    // ── Utility ──
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return [r,g,b];
    }

    function rgbToHex(r, g, b) {
      const h = n => Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2, "0");
      return `#${h(r)}${h(g)}${h(b)}`;
    }

    function hexToHsv(hex) {
      const [r, g, b] = hexToRgb(hex);
      const rn = r / 255, gn = g / 255, bn = b / 255;
      const max = Math.max(rn, gn, bn), min = Math.min(rn, gn, bn);
      const d = max - min;
      let h = 0;
      if (d !== 0) {
        if (max === rn) h = ((gn - bn) / d) % 6;
        else if (max === gn) h = (bn - rn) / d + 2;
        else h = (rn - gn) / d + 4;
        h = (h * 60 + 360) % 360;
      }
      const s = max === 0 ? 0 : (d / max) * 100;
      const v = max * 100;
      return { h, s, v };
    }

    function hsvToHex(h, s, v) {
      s /= 100; v /= 100;
      const c = v * s;
      const hp = h / 60;
      const x = c * (1 - Math.abs(hp % 2 - 1));
      let r = 0, g = 0, b = 0;
      if (0 <= hp && hp < 1) [r, g, b] = [c, x, 0];
      else if (1 <= hp && hp < 2) [r, g, b] = [x, c, 0];
      else if (2 <= hp && hp < 3) [r, g, b] = [0, c, x];
      else if (3 <= hp && hp < 4) [r, g, b] = [0, x, c];
      else if (4 <= hp && hp < 5) [r, g, b] = [x, 0, c];
      else if (5 <= hp && hp < 6) [r, g, b] = [c, 0, x];
      const m = v - c;
      return rgbToHex((r + m) * 255, (g + m) * 255, (b + m) * 255);
    }

    function createDynamicGradient(ctx, type, angle, stop, topColor, botColor, cx, cy, rLen, gLen) {
      let grad;
      const stopRatio = Math.max(0.01, Math.min(1, stop / 100));
      if (type === "linear") {
        const angleRad = (angle * Math.PI) / 180;
        const gx1 = cx - Math.cos(angleRad)*gLen/2;
        const gy1 = cy - Math.sin(angleRad)*gLen/2;
        const gx2 = cx + Math.cos(angleRad)*gLen/2;
        const gy2 = cy + Math.sin(angleRad)*gLen/2;
        grad = ctx.createLinearGradient(gx1,gy1,gx2,gy2);
      } else {
        grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, rLen);
      }
      grad.addColorStop(0, topColor);
      grad.addColorStop(stopRatio, botColor);
      if (stopRatio < 1) grad.addColorStop(1, botColor);
      return grad;
    }

    function drawTexture(ctx, texture, W, H) {
      if (texture === "none") return;
      ctx.save();
      if (texture === "crosshatch") {
        ctx.strokeStyle = "rgba(255,255,255,0.055)";
        ctx.lineWidth = 0.75;
        const spacing = 28;
        // diagonal lines in two directions
        for (let i = -H; i < W + H; i += spacing) {
          ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i - H, H); ctx.stroke();
        }
      } else if (texture === "dots") {
        ctx.fillStyle = "rgba(255,255,255,0.045)";
        const spacing = 22;
        for (let y = spacing/2; y < H; y += spacing) {
          for (let x = spacing/2; x < W; x += spacing) {
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, Math.PI*2);
            ctx.fill();
          }
        }
      } else if (texture === "grid") {
        ctx.strokeStyle = "rgba(255,255,255,0.04)";
        ctx.lineWidth = 1;
        const spacing = 40;
        for (let x = 0; x < W; x += spacing) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = 0; y < H; y += spacing) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
      } else if (texture === "lines") {
        ctx.strokeStyle = "rgba(255,255,255,0.04)";
        ctx.lineWidth = 1;
        const spacing = 18;
        for (let y = 0; y < H + W; y += spacing) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(y, 0); ctx.stroke();
        }
      }
      ctx.restore();
    }

    function getFontString(fontFamily, weight, size) {
      const font = FONTS.find(f => f.family === fontFamily) || FONTS[0];
      return `${font.weight} ${size}px '${font.family}', sans-serif`;
    }

    function drawMonogram(canvas, settings, exportSize) {
      const {
        bigLetter, name, shape,
        bgTop, bgBot, bgGradientType, bgGradientAngle, bgGradientStop, bgMode,
        kTop, kBot, kGradientType, kGradientAngle, kGradientStop, kMode,
        nameTop, nameBot, nameGradientType, nameGradientAngle, nameGradientStop, nameMode,
        outlineColor, ring1, ring2, ring1Width, ring2Width, ring1Gap, showRing1, showRing2,
        letterSize, nameSize, letterSpacing, outlineWidth, nameOffsetY,
        letterOffsetX, letterOffsetY,
        fontFamily, texture,
      } = settings;

      const glowEffect = settings.effects?.glow || {};
      const glow         = glowEffect.enabled   ?? settings.glow;
      const glowColor    = glowEffect.color     ?? settings.glowColor;
      const glowIntensity = glowEffect.intensity ?? settings.glowIntensity;

      const W = 700, H = 700;
      const size = exportSize || 700;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext("2d");
      if (size !== 700) ctx.scale(size / 700, size / 700);
      ctx.clearRect(0, 0, W, H);

      const cx = W/2, cy = H/2, R = W/2 - 16;

      // Layer draw functions — each operates on the shared ctx
      const drawBackground = () => {
        if (shape !== "none") {
          ctx.save();
          clipShape(ctx, shape, cx, cy, R);
          ctx.fillStyle = bgMode === "solid" ? bgTop : createDynamicGradient(ctx, bgGradientType, bgGradientAngle, bgGradientStop, bgTop, bgBot, cx, cy, H*0.7, H);
          ctx.fill();
          drawTexture(ctx, texture, W, H);
          ctx.restore();
        }
      };

      const drawRings = () => {
        if (shape !== "none") {
          if (showRing1) strokeShape(ctx, shape, cx, cy, R, ring1, ring1Width || 5);
          if (showRing2) strokeShape(ctx, shape, cx, cy, R - (ring1Gap || 18), ring2, ring2Width || 2);
        }
      };

      const drawBigLetter = () => {
        const letterFont = getFontString(fontFamily, 900, letterSize);
        ctx.font = letterFont;
        ctx.textAlign = "center";
        ctx.textBaseline = "alphabetic";
        const kX = cx + (letterOffsetX || 0);
        const kY = cy + (letterSize * 0.355) + (letterOffsetY || 0);
        // Visual center of the letter (midpoint of cap height ≈ 0.7×fontSize).
        // Transform (rotate/scale/skew) pivots around this point instead of the
        // baseline, matching the SVG path bounding-box center.
        const bigCY = kY - letterSize * 0.35;

        ctx.save();
        ctx.translate(kX, bigCY);
        ctx.rotate((settings.letterRotate || 0) * Math.PI / 180);
        ctx.scale(settings.letterScaleX || 1, settings.letterScaleY || 1);
        const skewX = Math.tan((settings.letterSkewX || 0) * Math.PI / 180);
        const skewY = Math.tan((settings.letterSkewY || 0) * Math.PI / 180);
        ctx.transform(1, skewY, skewX, 1, 0, 0);

        // Baseline offset: the origin is now at the visual center (bigCY),
        // but textBaseline="alphabetic" expects the baseline position.
        const baseOff = letterSize * 0.35;

        // Shadow first (bottom-most) so it never covers the glow — matches SVG order.
        const shadowEffect = settings.effects?.shadow || {};
        if (shadowEffect.enabled) {
          const [sr, sg, sb] = hexToRgb(shadowEffect.color || "#000000");
          ctx.save();
          ctx.fillStyle = `rgba(${sr}, ${sg}, ${sb}, ${shadowEffect.opacity ?? 0.5})`;
          ctx.shadowColor = `rgba(${sr}, ${sg}, ${sb}, ${shadowEffect.opacity ?? 0.5})`;
          ctx.shadowBlur = shadowEffect.blur ?? 8;
          ctx.shadowOffsetX = shadowEffect.dx ?? 4;
          ctx.shadowOffsetY = shadowEffect.dy ?? 4;
          ctx.font = letterFont;
          ctx.textAlign = "center";
          ctx.fillText(bigLetter, 0, baseOff);
          ctx.restore();
        }

        if (glow) {
          const glowRgb = hexToRgb(glowColor);
          for (const [rad, alpha] of [[32,0.75],[18,1.0],[8,1.0]]) {
            ctx.save();
            ctx.shadowColor = `rgba(${glowRgb[0]},${glowRgb[1]},${glowRgb[2]},${alpha * glowIntensity})`;
            ctx.shadowBlur = rad * glowIntensity * 2;
            ctx.fillStyle = `rgba(${glowRgb[0]},${glowRgb[1]},${glowRgb[2]},0)`;
            ctx.fillText(bigLetter, 0, baseOff);
            ctx.restore();
          }
          ctx.save();
          ctx.shadowColor = `rgba(${glowRgb[0]},${glowRgb[1]},${glowRgb[2]},1.0)`;
          ctx.shadowBlur = 40 * glowIntensity;
          ctx.fillStyle = glowColor;
          ctx.fillText(bigLetter, 0, baseOff);
          ctx.restore();
        }

        const embossEffect = settings.effects?.emboss || {};
        if (embossEffect.enabled) {
          const embossAngle = (embossEffect.angle ?? 135) * Math.PI / 180;
          const embossDepth = embossEffect.depth ?? 3;
          const dx = embossDepth * Math.cos(embossAngle);
          const dy = embossDepth * Math.sin(embossAngle);
          ctx.font = letterFont;
          ctx.textAlign = "center";
          ctx.textBaseline = "alphabetic";
          ctx.save();
          ctx.globalAlpha = embossEffect.opacity ?? 0.6;
          ctx.fillStyle = embossEffect.highlight || "#ffffff";
          ctx.fillText(bigLetter, -dx, baseOff - dy);
          ctx.restore();
          ctx.save();
          ctx.globalAlpha = embossEffect.opacity ?? 0.6;
          ctx.fillStyle = embossEffect.shadow || "#000000";
          ctx.fillText(bigLetter, dx, baseOff + dy);
          ctx.restore();
        }

        ctx.restore(); // end glow/shadow/emboss transform wrapper

        // ── Letter fill — blends against the BACKGROUND ONLY ──────────────
        // The blend mode must NOT interact with the letter's own glow, shadow,
        // or emboss (those are independent layers, already drawn above). So we
        // paint a copy of the background into an offscreen buffer, blend the
        // letter colour onto that copy, mask the buffer down to the glyph, then
        // composite the resulting opaque letter on top of the effects.
        {
          const lb = document.createElement("canvas");
          lb.width = canvas.width;
          lb.height = canvas.height;
          const lbx = lb.getContext("2d");
          if (size !== 700) lbx.scale(size / 700, size / 700);

          // 1. Background copy (full area — the letter may extend past the shape).
          //    For shape "none" there is no background, so the letter blends
          //    against nothing and just keeps its own colour (source-over).
          const hasBg = shape !== "none";
          if (hasBg) {
            lbx.fillStyle = bgMode === "solid"
              ? bgTop
              : createDynamicGradient(lbx, bgGradientType, bgGradientAngle, bgGradientStop, bgTop, bgBot, cx, cy, H*0.7, H);
            lbx.fillRect(0, 0, W, H);
          }

          // 2. Blend the letter colour onto the background copy.
          lbx.save();
          lbx.translate(kX, bigCY);
          lbx.rotate((settings.letterRotate || 0) * Math.PI / 180);
          lbx.scale(settings.letterScaleX || 1, settings.letterScaleY || 1);
          lbx.transform(1, skewY, skewX, 1, 0, 0);
          lbx.font = letterFont;
          lbx.textAlign = "center";
          lbx.textBaseline = "alphabetic";
          const blend = settings.letterBlendMode;
          lbx.globalCompositeOperation = (hasBg && blend && blend !== "normal") ? blend : "source-over";
          lbx.fillStyle = kMode === "solid"
            ? kTop
            : createDynamicGradient(lbx, kGradientType, kGradientAngle, kGradientStop, kTop, kBot, 0, 0, H*0.45, H*0.8);
          lbx.fillText(bigLetter, 0, baseOff);

          // 3. Mask the buffer down to just the glyph shape.
          lbx.globalCompositeOperation = "destination-in";
          lbx.fillStyle = "#000";
          lbx.fillText(bigLetter, 0, baseOff);
          lbx.restore();

          // 4. Composite the opaque blended glyph on top of the effects.
          ctx.save();
          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.globalAlpha = settings.letterOpacity ?? 1.0;
          ctx.drawImage(lb, 0, 0);
          ctx.restore();
        }
      };

      const drawName = () => {
        const nameFont = getFontString(fontFamily, 700, nameSize);
        ctx.font = nameFont;
        ctx.textAlign = "center";
        ctx.textBaseline = "alphabetic";
        ctx.letterSpacing = `${letterSpacing}px`;

        const nameY = cy + (nameSize * 0.355) + (nameOffsetY || 0);
        const nameX = cx + (letterSpacing / 2);

        const nameShadowEffect = settings.effects?.nameShadow || {};
        if (nameShadowEffect.enabled) {
          const [nsr, nsg, nsb] = hexToRgb(nameShadowEffect.color || "#000000");
          ctx.save();
          ctx.fillStyle = `rgba(${nsr}, ${nsg}, ${nsb}, ${nameShadowEffect.opacity ?? 0.5})`;
          ctx.shadowColor = `rgba(${nsr}, ${nsg}, ${nsb}, ${nameShadowEffect.opacity ?? 0.5})`;
          ctx.shadowBlur = nameShadowEffect.blur ?? 6;
          ctx.shadowOffsetX = nameShadowEffect.dx ?? 3;
          ctx.shadowOffsetY = nameShadowEffect.dy ?? 3;
          ctx.font = nameFont;
          ctx.textAlign = "center";
          ctx.lineJoin = "round";
          ctx.lineWidth = outlineWidth;
          ctx.strokeStyle = `rgba(${nsr}, ${nsg}, ${nsb}, ${nameShadowEffect.opacity ?? 0.5})`;
          ctx.strokeText(name, nameX, nameY);
          ctx.fillText(name, nameX, nameY);
          ctx.restore();
        }

        const nameGlowEffect = settings.effects?.nameGlow || {};
        if (nameGlowEffect.enabled) {
          const ngRgb = hexToRgb(nameGlowEffect.color || "#ffc828");
          const ngIntensity = nameGlowEffect.intensity ?? 1.0;
          for (const [rad, alpha] of [[24,0.75],[12,1.0],[5,1.0]]) {
            ctx.save();
            ctx.shadowColor = `rgba(${ngRgb[0]},${ngRgb[1]},${ngRgb[2]},${alpha * ngIntensity})`;
            ctx.shadowBlur = rad * ngIntensity * 2;
            ctx.fillStyle = `rgba(${ngRgb[0]},${ngRgb[1]},${ngRgb[2]},0)`;
            ctx.fillText(name, nameX, nameY);
            ctx.restore();
          }
          ctx.save();
          ctx.shadowColor = `rgba(${ngRgb[0]},${ngRgb[1]},${ngRgb[2]},1.0)`;
          ctx.shadowBlur = 30 * ngIntensity;
          ctx.fillStyle = nameGlowEffect.color || "#ffc828";
          ctx.fillText(name, nameX, nameY);
          ctx.restore();
        }

        ctx.lineJoin = "round";
        ctx.lineWidth = outlineWidth * 2;
        ctx.strokeStyle = outlineColor;
        ctx.strokeText(name, nameX, nameY);

        const nameGrad = createDynamicGradient(ctx, nameGradientType, nameGradientAngle, nameGradientStop, nameTop, nameBot, cx, nameY - nameSize * 0.35, nameSize*1.5, nameSize*2);
        ctx.fillStyle = nameGrad;
        ctx.fillText(name, nameX, nameY);
        ctx.letterSpacing = "0px";
      };

      // Layer draw map — background/rings are pinned as a unit (bg always first)
      const layerDrawFns = {
        background: drawBackground,
        rings:      drawRings,
        bigLetter:  drawBigLetter,
        name:       drawName,
      };

      // Draw layers in the user-specified order, skipping hidden ones.
      // Background is always drawn first (pinned at index 0 in UI).
      const layers = settings.layers || [
        { id: "background", visible: true },
        { id: "rings",      visible: true },
        { id: "bigLetter",  visible: true },
        { id: "name",       visible: true },
      ];
      for (const layer of layers) {
        if (layer.visible === false) continue;
        const fn = layerDrawFns[layer.id];
        if (fn) fn();
      }
    }

    // ── Font loader for SVG path conversion ──
    // Maps font family → woff2 path. Each entry matches the @font-face block in <head>.
    // For Poppins we point at the 900-weight file because the big letter is rendered at weight 900.
    const FONT_FILES = {
      "Poppins":           "./fonts/poppins-v24-latin-900.woff2",
      "Playfair Display":  "./fonts/playfair-display-sc-v18-latin-700.woff2",
      "Bebas Neue":        "./fonts/bebas-neue-v16-latin-regular.woff2",
      "Cinzel":            "./fonts/cinzel-v26-latin-700.woff2",
      "Dancing Script":    "./fonts/dancing-script-v29-latin-700.woff2",
      "Space Mono":        "./fonts/space-mono-v17-latin-700.woff2",
      "Cormorant Upright": "./fonts/cormorant-upright-v19-latin-700.woff2",
      "Abril Fatface":     "./fonts/abril-fatface-v25-latin-regular.woff2",
      "Cinzel Decorative": "./fonts/cinzel-decorative-v16-latin-700.woff2",
      "UnifrakturCook":    "./fonts/unifrakturcook-v17-latin-700.woff2",
      "Pirata One":        "./fonts/pirata-one-v23-latin-regular.woff2",
      "Audiowide":         "./fonts/audiowide-v17-latin-regular.woff2",
      "Black Ops One":     "./fonts/black-ops-one-v19-latin-regular.woff2",
      "Russo One":         "./fonts/russo-one-v14-latin-regular.woff2",
      "Caveat":            "./fonts/caveat-v18-latin-700.woff2",
      "Special Elite":     "./fonts/special-elite-v18-latin-regular.woff2",
      "Pacifico":          "./fonts/pacifico-v22-latin-regular.woff2",
      "Bungee":            "./fonts/bungee-latin-regular.woff2",
      "Monoton":           "./fonts/monoton-latin-regular.woff2",
      "Bangers":           "./fonts/bangers-latin-regular.woff2",
      "Rye":               "./fonts/rye-latin-regular.woff2",
      "Silkscreen":        "./fonts/silkscreen-latin-regular.woff2",
      "Righteous":         "./fonts/righteous-v17-latin-regular.woff2",
      "Merriweather":      "./fonts/merriweather-v40-latin-900.woff2",
    };

    // Cache parsed Typr font objects. fetch+parse runs at most once per family.
    const _parsedFontCache = new Map();
    async function loadParsedFont(fontFamily) {
      if (_parsedFontCache.has(fontFamily)) return _parsedFontCache.get(fontFamily);
      if (typeof Typr === "undefined") throw new Error("Typr.js not loaded");
      
      const path = FONT_FILES[fontFamily] || FONT_FILES["Poppins"];
      const resp = await fetch(path);
      if (!resp.ok) throw new Error(`Font fetch failed: ${path} (${resp.status})`);
      
      const buffer = await resp.arrayBuffer();
      
      // Ensure the WebAssembly module has loaded globally
      if (typeof Module === "undefined" || !Module.decompress) {
        throw new Error("wawoff2 WASM module (Module) is not ready or loaded.");
      }
      
      // Decompress the .woff2 bytes
      const decompressedData = Module.decompress(new Uint8Array(buffer));
      
      // CRITICAL: Clone the data out of the WebAssembly heap allocation 
      // into a fresh, exact-sized ArrayBuffer for Typr to read safely
      const cleanBuffer = Uint8Array.from(decompressedData).buffer;
      
      const parsed = Typr.parse(cleanBuffer);
      
      // Typr.parse returns an array for font collections; standalone fonts return a single-item array
      const font = Array.isArray(parsed) ? parsed[0] : parsed;
      _parsedFontCache.set(fontFamily, font);
      return font;
    }

    // Render `text` as a single SVG <path> element (one combined d string so a single
    // gradient/fill spans the whole text run, matching the original <text> behavior).
    // Returns { pathD, width } in root SVG coordinates (px), with the
    // scale+translate transform baked directly into the path data.
    // This avoids <g transform> wrappers that break userSpaceOnUse gradients.
    //
    //   anchor: "start" | "middle" | "end"
    //   letterSpacing: extra px inserted between each glyph (matches canvas/SVG letter-spacing)
    function textToCombinedPathD(font, text, fontSize, baselineX, baselineY, letterSpacing = 0, anchor = "middle") {
      const unitsPerEm = font.head.unitsPerEm;
      const scale = fontSize / unitsPerEm;
      const letterSpacingUnits = letterSpacing / scale;

      // Walk codepoints (handles BMP-only — full surrogate-pair support not needed for
      // the names + Latin letters this app supports).
      const glyphs = [];
      let advanceTotal = 0;
      for (const ch of text) {
        const cp = ch.codePointAt(0);
        const gid = Typr.U.codeToGlyph(font, cp);
        const gpath = Typr.U.glyphToPath(font, gid);
        const aWidth = (font.hmtx && font.hmtx.aWidth && font.hmtx.aWidth[gid] != null)
          ? font.hmtx.aWidth[gid] : 0;
        glyphs.push({ gpath, aWidth });
        advanceTotal += aWidth + letterSpacingUnits;
      }
      // Trailing letter-spacing shouldn't widen the run
      if (glyphs.length > 0) advanceTotal -= letterSpacingUnits;

      const totalWidthPx = advanceTotal * scale;

      // Merge each glyph's path into one cmds/crds pair, with each glyph's coordinates
      // translated by the running advance cursor (in font units).
      const mergedCmds = [];
      const mergedCrds = [];
      let xCursor = 0;
      for (const { gpath, aWidth } of glyphs) {
        if (gpath && gpath.cmds && gpath.crds) {
          for (let i = 0; i < gpath.cmds.length; i++) mergedCmds.push(gpath.cmds[i]);
          for (let i = 0; i < gpath.crds.length; i += 2) {
            mergedCrds.push(gpath.crds[i] + xCursor);
            mergedCrds.push(gpath.crds[i + 1]);
          }
        }
        xCursor += aWidth + letterSpacingUnits;
      }

      // Horizontal anchor offset in px
      let xOffsetPx = 0;
      if (anchor === "middle") xOffsetPx = -totalWidthPx / 2;
      else if (anchor === "end") xOffsetPx = -totalWidthPx;

      // Bake the transform directly into the coordinates: scale(s, -s) then translate(tx, ty).
      // This produces root SVG coordinates so userSpaceOnUse gradients align correctly.
      const tx = baselineX + xOffsetPx;
      const ty = baselineY;
      for (let i = 0; i < mergedCrds.length; i += 2) {
        mergedCrds[i]     = mergedCrds[i]     * scale + tx;
        mergedCrds[i + 1] = mergedCrds[i + 1] * (-scale) + ty;
      }

      // Compute bounding box from merged coordinates
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (let i = 0; i < mergedCrds.length; i += 2) {
        const x = mergedCrds[i], y = mergedCrds[i + 1];
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }

      const pathD = Typr.U.pathToSVG({ cmds: mergedCmds, crds: mergedCrds }, 2);
      return { pathD, width: totalWidthPx, centerX: (minX + maxX) / 2, centerY: (minY + maxY) / 2 };
    }

    // ── SVG Export ──
    function buildShapeSVGPath(shape, cx, cy, R) {
      switch(shape) {
        case "circle": return `M ${cx} ${cy} m -${R} 0 a ${R} ${R} 0 1 0 ${R*2} 0 a ${R} ${R} 0 1 0 -${R*2} 0`;
        case "square": return `M ${cx-R} ${cy-R} h ${R*2} v ${R*2} h -${R*2} Z`;
        case "rounded-square": {
          const r = R*0.18;
          return `M ${cx-R+r} ${cy-R} L ${cx+R-r} ${cy-R} Q ${cx+R} ${cy-R} ${cx+R} ${cy-R+r} L ${cx+R} ${cy+R-r} Q ${cx+R} ${cy+R} ${cx+R-r} ${cy+R} L ${cx-R+r} ${cy+R} Q ${cx-R} ${cy+R} ${cx-R} ${cy+R-r} L ${cx-R} ${cy-R+r} Q ${cx-R} ${cy-R} ${cx-R+r} ${cy-R} Z`;
        }
        case "diamond": return `M ${cx} ${cy-R} L ${cx+R} ${cy} L ${cx} ${cy+R} L ${cx-R} ${cy} Z`;
        case "hexagon": {
          const pts = [];
          for (let i=0; i<6; i++) {
            const a = (Math.PI/3)*i - Math.PI/6;
            pts.push(`${cx+R*Math.cos(a)} ${cy+R*Math.sin(a)}`);
          }
          return `M ${pts.join(" L ")} Z`;
        }
        case "triangle": {
          const p1 = `${cx} ${cy-R}`;
          const p2 = `${cx+R*Math.cos(Math.PI/6)} ${cy+R*Math.sin(Math.PI/6)}`;
          const p3 = `${cx-R*Math.cos(Math.PI/6)} ${cy+R*Math.sin(Math.PI/6)}`;
          return `M ${p1} L ${p2} L ${p3} Z`;
        }
        case "pentagram": {
          let d = "";
          for (let i=0; i<5; i++) {
            const a = -Math.PI/2 + i*2*Math.PI/5;
            const px = cx+R*Math.cos(a), py = cy+R*Math.sin(a);
            const a2 = a + Math.PI/5;
            const r2 = R*0.382;
            const px2 = cx+r2*Math.cos(a2), py2 = cy+r2*Math.sin(a2);
            d += (i===0 ? `M ${px} ${py}` : ` L ${px} ${py}`) + ` L ${px2} ${py2}`;
          }
          return d + " Z";
        }
        case "hexagram": {
          let d = "";
          for (let i=0; i<6; i++) {
            const a = -Math.PI/2 + i*2*Math.PI/6;
            const px = cx+R*Math.cos(a), py = cy+R*Math.sin(a);
            const a2 = a + Math.PI/6;
            const r2 = R*0.577;
            const px2 = cx+r2*Math.cos(a2), py2 = cy+r2*Math.sin(a2);
            d += (i===0 ? `M ${px} ${py}` : ` L ${px} ${py}`) + ` L ${px2} ${py2}`;
          }
          return d + " Z";
        }
        default: return `M ${cx} ${cy} m -${R} 0 a ${R} ${R} 0 1 0 ${R*2} 0 a ${R} ${R} 0 1 0 -${R*2} 0`;
      }
    }

    async function exportSVG(settings) {
      const {
        bigLetter, name, shape,
        bgTop, bgBot, bgGradientType, bgGradientAngle, bgGradientStop, bgMode,
        kTop, kBot, kGradientType, kGradientAngle, kGradientStop, kMode,
        nameTop, nameBot, nameGradientType, nameGradientAngle, nameGradientStop, nameMode,
        outlineColor, ring1, ring2, ring1Width, ring2Width, ring1Gap, showRing1, showRing2,
        letterSize, nameSize, letterSpacing, outlineWidth, nameOffsetY,
        letterOffsetX, letterOffsetY,
        fontFamily, texture,
      } = settings;

      const glowEffect = settings.effects?.glow || {};
      const glow         = glowEffect.enabled   ?? settings.glow;
      const glowColor    = glowEffect.color     ?? settings.glowColor;
      const glowIntensity = glowEffect.intensity ?? settings.glowIntensity;

      const shadowEffect = settings.effects?.shadow || {};

      const font = FONTS.find(f => f.family === fontFamily) || FONTS[0];

      const nameWeight = font.weight;

      const kX = cx + (letterOffsetX || 0);
      const kY = cy + letterSize * 0.355 + (letterOffsetY || 0);
      const nameY = cy + nameSize * 0.355 + (nameOffsetY || 0);
      const nameX = cx + (letterSpacing / 2);

      const shapePath = buildShapeSVGPath(shape, cx, cy, R);
      const ring2R = R - (ring1Gap || 18);

      // Uses userSpaceOnUse so the angle is always accurate regardless of the

      // gCx/gCy: centre of the gradient in SVG user-space px.
      // rLen: radius for radial gradients. gLen: full span for linear gradients.
      function buildGradientDef(id, type, angle, stop, topColor, botColor, gCx, gCy, rLen, gLen) {

      const nameNGEnabled = settings.effects?.nameGlow?.enabled;

    <filter id="nameGlowBlur0" x="-200" y="-200" width="1100" height="1100" filterUnits="userSpaceOnUse"><feGaussianBlur stdDeviation="${24 * ngi}"/></filter>

            { std: 18 * gi, op: 0.18 * gi },
            { std: 8 * gi,  op: 0.35 * gi },

        const namePath = `<path d="${nm.pathD}"
      fill="${nameMode === "solid" ? nameTop : "url(#nameGrad)"}"

      stroke-width="${outlineWidth * 2}"

        if (nameNGEnabled) {

          const ngi = settings.effects.nameGlow.intensity || 1.0;
          const nameGlowLayers = [
            { std: 24 * ngi, op: 0.45  * ngi },
            { std: 12 * ngi, op: 0.6  * ngi },
            { std: 5  * ngi, op: 0.7  * ngi },
            { std: 30 * ngi, op: 1.0 },

        if (glow) {

            { std: 18 * gi, op: 0.2  * gi },
            { std: 8 * gi,  op: 0.35 * gi },
            { std: 40 * gi, op: 0.5 },

            `<text x="${kX}" y="${kY}" text-anchor="middle" font-family="'${font.family}', sans-serif" font-size="${letterSize}" font-weight="${letterWeight}" fill="${glowColor}" fill-opacity="${l.op}" filter="url(#glowBlur${i})">${bigLetter}</text>`
          ).join("\n    ");
          const glowCoreFB = `<text x="${kX}" y="${kY}" text-anchor="middle" font-family="'${font.family}', sans-serif" font-size="${letterSize}" font-weight="${letterWeight}" fill="${glowColor}">${bigLetter}</text>`;
          glowFallbackSVG = glowBlurredFB + "\n    " + glowCoreFB;
        }
        // Fallback: shadow as blurred <text> element
        let shadowFallbackSVG = "";
        if (shadowEffect.enabled) {

        if (nameNGEnabled) {

          const ngi = settings.effects.nameGlow.intensity || 1.0;
          const nameGlowLayers = [
            { std: 24 * ngi, op: 0.45  * ngi },
            { std: 12 * ngi, op: 0.6  * ngi },

      const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">

      showRing1 ? `<path d="${shapePath}" fill="none" stroke="${ring1}" stroke-width="${ring1Width || 5}"/>` : "",
      showRing2 ? `<path d="${buildShapeSVGPath(shape, cx, cy, ring2R)}" fill="none" stroke="${ring2}" stroke-width="${ring2Width || 2}"/>` : "",

    const bigLetterTransform = `translate(${bigCX} ${bigCY}) rotate(${settings.letterRotate || 0}) scale(${settings.letterScaleX || 1} ${settings.letterScaleY || 1}) skewX(${settings.letterSkewX || 0}) skewY(${settings.letterSkewY || 0}) translate(${-bigCX} ${-bigCY})`;

      rings:      ringsSVG,

      { id: "background", visible: true },
      { id: "rings",      visible: true },
      { id: "bigLetter",  visible: true },

      const blob = new Blob([svgContent], { type: "image/svg+xml" });

    function clipShape(ctx, shape, cx, cy, R) {
      ctx.beginPath();
      buildShapePath(ctx, shape, cx, cy, R);
      ctx.clip();
    }

    function strokeShape(ctx, shape, cx, cy, R, color, width) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      buildShapePath(ctx, shape, cx, cy, R);
      ctx.stroke();
      ctx.restore();
    }

    function buildShapePath(ctx, shape, cx, cy, R) {
      switch(shape) {
        case "circle": ctx.arc(cx, cy, R, 0, Math.PI*2); break;
        case "square": ctx.rect(cx-R, cy-R, R*2, R*2); break;
        case "rounded-square": {
          const r = R*0.18;
          ctx.moveTo(cx-R+r, cy-R); ctx.lineTo(cx+R-r, cy-R); ctx.arcTo(cx+R, cy-R, cx+R, cy-R+r, r);
          ctx.lineTo(cx+R, cy+R-r); ctx.arcTo(cx+R, cy+R, cx+R-r, cy+R, r);
          ctx.lineTo(cx-R+r, cy+R); ctx.arcTo(cx-R, cy+R, cx-R, cy+R-r, r);
          ctx.lineTo(cx-R, cy-R+r); ctx.arcTo(cx-R, cy-R, cx-R+r, cy-R, r); ctx.closePath(); break;
        }
        case "diamond": ctx.moveTo(cx, cy-R); ctx.lineTo(cx+R, cy); ctx.lineTo(cx, cy+R); ctx.lineTo(cx-R, cy); ctx.closePath(); break;
        case "hexagon": {
          for (let i=0; i<6; i++) { const a=(Math.PI/3)*i-Math.PI/6, px=cx+R*Math.cos(a), py=cy+R*Math.sin(a); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
          ctx.closePath(); break;
        }
        case "triangle": ctx.moveTo(cx, cy-R); ctx.lineTo(cx+R*Math.cos(Math.PI/6), cy+R*Math.sin(Math.PI/6)); ctx.lineTo(cx-R*Math.cos(Math.PI/6), cy+R*Math.sin(Math.PI/6)); ctx.closePath(); break;
        case "pentagram": {
          for (let i=0; i<5; i++) {
            const a=-Math.PI/2+(i*2*Math.PI/5), px=cx+R*Math.cos(a), py=cy+R*Math.sin(a);
            i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
            const a2=a+Math.PI/5, r2=R*0.382; ctx.lineTo(cx+r2*Math.cos(a2), cy+r2*Math.sin(a2));
          }
          ctx.closePath(); break;
        }
        case "hexagram": {
          for (let i=0; i<6; i++) {
            const a=-Math.PI/2+(i*2*Math.PI/6), px=cx+R*Math.cos(a), py=cy+R*Math.sin(a);
            i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
            const a2=a+Math.PI/6, r2=R*0.577; ctx.lineTo(cx+r2*Math.cos(a2), cy+r2*Math.sin(a2));
          }
          ctx.closePath(); break;
        }

    // ── Preset thumbnail renderer ──

    // ── URL share encode/decode ──
    function encodeSettings(s) {
      try { return btoa(unescape(encodeURIComponent(JSON.stringify(s)))); } catch { return null; }

    function decodeSettings(str) {
      try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } catch { return null; }

    // ── HSL-to-HEX ──
    const hslToHex = (h, s, l) => {
      l /= 100;
      const a = s * Math.min(l, 1 - l) / 100;
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    };

    // ── UI Components ──
    function ColorWheel({ value, onChange }) {
      const canvasRef = React.useRef(null);
      const hsv = hexToHsv(value);
      const size = 170;
      const ringOuter = 80;
      const ringInner = 62;
      const squareSize = 76;
      const squareOffset = (size - squareSize) / 2;

      React.useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, size, size);
        const cx = size / 2, cy = size / 2;

        // Draw hue ring
        for (let angle = 0; angle < 360; angle += 1) {
          const startRad = ((angle - 0.5) * Math.PI) / 180;
          const endRad = ((angle + 0.5) * Math.PI) / 180;
          ctx.beginPath();
          ctx.arc(cx, cy, (ringOuter + ringInner) / 2, startRad, endRad);
          ctx.lineWidth = ringOuter - ringInner;
          ctx.strokeStyle = `hsl(${angle}, 100%, 50%)`;
          ctx.stroke();
        }

        // Draw saturation/value square
        for (let x = 0; x < squareSize; x++) {
          for (let y = 0; y < squareSize; y++) {
            const s = (x / squareSize) * 100;
            const v = (1 - y / squareSize) * 100;
            ctx.fillStyle = hsvToHex(hsv.h, s, v);
            ctx.fillRect(squareOffset + x, squareOffset + y, 1.5, 1.5);
          }
        }
      }, [hsv.h]);

      const getPosFromEvent = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (size / rect.width);
        const y = (e.clientY - rect.top) * (size / rect.height);
        return { x, y };
      };

      const isOnRing = (x, y) => {
        const cx = size / 2, cy = size / 2;
        const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
        return dist >= ringInner && dist <= ringOuter;
      };

      const isOnSquare = (x, y) => {
        return x >= squareOffset && x <= squareOffset + squareSize && y >= squareOffset && y <= squareOffset + squareSize;
      };

      const handleInteraction = (e) => {
        const { x, y } = getPosFromEvent(e);
        const cx = size / 2, cy = size / 2;
        if (isOnRing(x, y)) {
          const angle = ((Math.atan2(y - cy, x - cx) * 180) / Math.PI + 360) % 360;
          onChange(hsvToHex(angle, hsv.s, hsv.v));
        } else if (isOnSquare(x, y)) {
          const s = Math.max(0, Math.min(100, ((x - squareOffset) / squareSize) * 100));
          const v = Math.max(0, Math.min(100, (1 - (y - squareOffset) / squareSize) * 100));
          onChange(hsvToHex(hsv.h, s, v));
        }
      };

      const dragging = React.useRef(false);

      const onPointerDown = (e) => {
        e.preventDefault();
        dragging.current = true;
        handleInteraction(e);
        const onMove = (ev) => { if (dragging.current) handleInteraction(ev); };
        const onUp = () => { dragging.current = false; window.removeEventListener("pointermove", onMove); window.removeEventListener("pointerup", onUp); };
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
      };

      // Hue thumb position
      const hueRad = (hsv.h * Math.PI) / 180;
      const hueR = (ringOuter + ringInner) / 2;
      const hueX = size / 2 + Math.cos(hueRad) * hueR;
      const hueY = size / 2 + Math.sin(hueRad) * hueR;

      // SV thumb position
      const svX = squareOffset + (hsv.s / 100) * squareSize;
      const svY = squareOffset + (1 - hsv.v / 100) * squareSize;

      return (
        <canvas
          ref={canvasRef}
          width={size}
          height={size}
          style={{ width: size, height: size, cursor: "crosshair", borderRadius: 8, flexShrink: 0 }}
          onPointerDown={onPointerDown}
        />
      );
    }

    function ColorPickerRow({ label, value, onChange }) {
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      const [hexInput, setHexInput] = useState(value);
      const [rInput, setRInput] = useState("");
      const [gInput, setGInput] = useState("");
      const [bInput, setBInput] = useState("");
      const [r, g, b] = hexToRgb(value);

      useEffect(() => { if (open) { setHexInput(value.slice(1)); setRInput(""); setGInput(""); setBInput(""); } }, [open, value]);

      useEffect(() => {
        if (!open) return;
        const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        const esc = (e) => { if (e.key === "Escape") setOpen(false); };
        window.addEventListener("mousedown", close);
        window.addEventListener("keydown", esc);
        return () => { window.removeEventListener("mousedown", close); window.removeEventListener("keydown", esc); };
      }, [open]);

      const commitRgb = (rv, gv, bv) => {
        const clamp = v => Math.min(255, Math.max(0, Math.round(Number(v) || 0)));

      return (
        <div className="control-row color-picker-row" ref={ref}>
          <label>{label}</label>
          <div className="color-picker-wrap">
            <button type="button" className="color-swatch" style={{ background: value }}
              onClick={() => setOpen(o => !o)} aria-label={`${label}: ${value}`} aria-expanded={open} />
            <span className="hex-label">{value.toUpperCase()}</span>
            {open && (
              <>
                <div className="color-picker-backdrop" onClick={() => setOpen(false)} />
                <div className="color-picker-popover" role="dialog" aria-label={`Pick ${label}`} onPointerDown={e => e.stopPropagation()}>
                  <button type="button" className="color-picker-close" onClick={() => setOpen(false)} aria-label="Close color picker">&times;</button>
                <div className="color-picker-body">
                  <ColorWheel value={value} onChange={onChange} />
                  <div className="color-picker-inputs">
                    <label className="color-input-label"><span>HEX</span>
                      <input type="text" value={hexInput}
                        onChange={e => { const v = e.target.value.replace(/[^0-9a-fA-F]/g, "").slice(0, 6); setHexInput(v); if (v.length === 6) onChange("#" + v); }}
                        onBlur={() => setHexInput(value.slice(1))} maxLength={6} />
                    </label>
                    <label className="color-input-label"><span>R</span>
                      <input type="text" value={rInput || String(r)}
                        onChange={e => setRInput(e.target.value.replace(/[^0-9]/g, "").slice(0, 3))}
                        onBlur={() => { if (rInput !== "") commitRgb(rInput, g, b); setRInput(""); }} />
                    </label>
                    <label className="color-input-label"><span>G</span>
                      <input type="text" value={gInput || String(g)}
                        onChange={e => setGInput(e.target.value.replace(/[^0-9]/g, "").slice(0, 3))}
                        onBlur={() => { if (gInput !== "") commitRgb(r, gInput, b); setGInput(""); }} />
                    </label>
                    <label className="color-input-label"><span>B</span>
                      <input type="text" value={bInput || String(b)}
                        onChange={e => setBInput(e.target.value.replace(/[^0-9]/g, "").slice(0, 3))}
                        onBlur={() => { if (bInput !== "") commitRgb(r, g, bInput); setBInput(""); }} />
                    </label>
                  </div>
                </div>
              </div>
              </>

        </div>

    }

    function SliderRow({ label, value, min, max, step=1, onChange, unit="" }) {

    // Settings migration — runs on every external load to fill in newly added keys.
    function migrateSettings(s) {
      if (!s) return s;
      if (s.bgMode === undefined)   s.bgMode = "gradient";
      if (s.kMode === undefined)    s.kMode = "gradient";
      if (s.nameMode === undefined) s.nameMode = "gradient";
      if (!s.effects) s.effects = {};
      if (!s.effects.glow) {
        s.effects.glow = {
          enabled:   s.glow ?? true,
          color:     s.glowColor ?? "#ffdc50",
          intensity: s.glowIntensity ?? 1.0
        };
      }
      if (!s.effects.shadow) {
        s.effects.shadow = { enabled: false, dx: 4, dy: 4, blur: 8, color: "#000000", opacity: 0.5 };
      }
      if (!s.effects.nameGlow) {
        s.effects.nameGlow = { enabled: false, color: "#ffc828", intensity: 1.0 };
      }
      if (!s.effects.nameShadow) {
        s.effects.nameShadow = { enabled: false, dx: 3, dy: 3, blur: 6, color: "#000000", opacity: 0.5 };
      }
      // M3: letter transform defaults (F19)
      if (s.letterScaleX === undefined) s.letterScaleX = 1.0;
      if (s.letterScaleY === undefined) s.letterScaleY = 1.0;
      if (s.letterSkewX  === undefined) s.letterSkewX  = 0;
      if (s.letterSkewY  === undefined) s.letterSkewY  = 0;
      if (s.letterRotate === undefined) s.letterRotate = 0;
      // M4: emboss defaults (F18)
      if (!s.effects.emboss) {
        s.effects.emboss = { enabled: false, depth: 3, angle: 135, highlight: "#ffffff", shadow: "#000000", opacity: 0.6 };
      }
      // M5: blend mode default (F16)
      if (s.letterBlendMode === undefined) s.letterBlendMode = "normal";
      if (s.letterOpacity    === undefined) s.letterOpacity    = 1.0;
      // M6: layer stack default (F17)
      if (!s.layers) {
        s.layers = [
          { id: "background", label: "Background", visible: true },
          { id: "rings",      label: "Rings",      visible: true },
          { id: "bigLetter",  label: "Big Letter",  visible: true },
          { id: "name",       label: "Name",        visible: true },
        ];
      }
      // Validate layerOrder: drop unknown ids, append missing
      const CANONICAL_LAYERS = [
        { id: "background", label: "Background" },
        { id: "rings",      label: "Rings" },
        { id: "bigLetter",  label: "Big Letter" },
        { id: "name",       label: "Name" },
      ];
      const layerMap = new Map(s.layers.map(l => [l.id, l]));
      s.layers = CANONICAL_LAYERS.map(c => {
        const existing = layerMap.get(c.id);
        return existing ? { ...c, visible: existing.visible !== false } : { ...c, visible: true };
      });
      return s;
    }

    function App() {

        }

      const [saveSlotName, setSaveSlotName] = useState("");

        if (duplicate) { setSaveSlotError("A preset with this name already exists."); return; }
        handleSaveToSlot(selectedSlotIndex, trimmed);
        setSaveSlotMode(false);
        setSelectedSlotIndex(null);
        setSaveSlotName("");
        setSaveSlotError(null);
      }, [selectedSlotIndex, saveSlotName, presetSlots, handleSaveToSlot]);

      // ── Undo/redo history ──
      const historyRef = useRef([settings]);
      const historyIndexRef = useRef(0);

      const set = useCallback((key, val) => {
        setSettings(s => {
          const next = { ...s, [key]: val };
          // Trim forward history on new change
          historyRef.current = historyRef.current.slice(0, historyIndexRef.current + 1);
          historyRef.current.push(next);
          if (historyRef.current.length > 100) historyRef.current.shift();
          historyIndexRef.current = historyRef.current.length - 1;
          return next;
        });
      }, []);

      const setEffect = useCallback((effectName, field, value) => {
        setSettings(s => {
          const nextEffects = {
            ...s.effects,
            [effectName]: { ...(s.effects?.[effectName] || {}), [field]: value }
          };
          const next = { ...s, effects: nextEffects };
          if (effectName === "glow") {
            if (field === "enabled")   next.glow         = value;
            if (field === "color")     next.glowColor    = value;
            if (field === "intensity") next.glowIntensity = value;
          }
          historyRef.current = historyRef.current.slice(0, historyIndexRef.current + 1);
          historyRef.current.push(next);
          if (historyRef.current.length > 100) historyRef.current.shift();
          historyIndexRef.current = historyRef.current.length - 1;
          return next;
        });
      }, []);

      const undo = useCallback(() => {
        if (historyIndexRef.current > 0) {
          historyIndexRef.current--;
          setSettings(historyRef.current[historyIndexRef.current]);
        }
      }, []);

      const redo = useCallback(() => {
        if (historyIndexRef.current < historyRef.current.length - 1) {
          historyIndexRef.current++;
          setSettings(historyRef.current[historyIndexRef.current]);
        }
      }, []);

      const resetToDefault = useCallback(() => {
        setSettings(s => {
          const next = { ...DEFAULT_SETTINGS };
          historyRef.current = historyRef.current.slice(0, historyIndexRef.current + 1);
          historyRef.current.push(next);
          if (historyRef.current.length > 100) historyRef.current.shift();
          historyIndexRef.current = historyRef.current.length - 1;
          return next;
        });

      useEffect(() => {

        const themeRoll = Math.random();
        
        let getThemeHue;
        if (themeRoll < 0.45) {
          // Analogous: Colors right next to each other
          getThemeHue = () => (baseHue + (Math.random() * 40 - 20) + 360) % 360;
        } else if (themeRoll < 0.80) {
          // Complementary: High-contrast opposite pairings
          getThemeHue = () => Math.random() > 0.5 ? baseHue : (baseHue + 180) % 360;
        } else {
          // Monochromatic: Single hue variations
          getThemeHue = () => baseHue;
        }

        // Generate a cohesive background palette (usually mid-to-dark for standard contrast)
        const bgL = Math.floor(Math.random() * 30) + 15; // 15% - 45% luminosity

        };

        const nameSat = Math.floor(Math.random() * 45) + 45;                     // 45% to 90% saturation for real color punch
        const nameLightTop = Math.floor(Math.random() * 25) + 55;                // 55% to 80% lightness (rich color space instead of pure white)
        const nameLightBot = Math.max(35, nameLightTop - Math.floor(Math.random() * 15) - 5); // Subtle gradient drop

        const fontChoices = ["Poppins", "Playfair Display", "Bebas Neue", "Cinzel", "Dancing Script", "Space Mono", "Cormorant Upright", "Abril Fatface"];
        const shapeChoices = ["circle", "square", "rounded-square", "diamond", "hexagon", "triangle", "pentagram", "hexagram"];

          bgGradientStop: Math.floor(Math.random() * 40) + 60, // 60% to 100%

          // Big Monogram Letter configuration keys
          kTop: genAccentColor(75),
          kBot: genAccentColor(45),
          kGradientType: Math.random() > 0.3 ? "linear" : "radial",
          kGradientAngle: Math.floor(Math.random() * 360),
          kGradientStop: Math.floor(Math.random() * 30) + 70,

          // Lower Badge Name configuration keys

          nameBot: nameBotHex,
          nameGradientType: "linear",
          nameGradientAngle: 90,
          nameGradientStop: Math.floor(Math.random() * 30) + 40,

          outlineColor: bgBotHex,
          outlineWidth: Math.floor(Math.random() * 3) + 1, // 1px to 3px

          // Inner & Outer Ring Configurations
          showRing1: Math.random() > 0.15,
          ring1: genAccentColor(60),
          ring1Width: Math.floor(Math.random() * 5) + 2, // 2px to 6px
          ring1Gap: Math.floor(Math.random() * 16) + 12, // 12px to 28px

          showRing2: Math.random() > 0.3,

          ring2Width: Math.floor(Math.random() * 3) + 1, // 1px to 3px

          glow: Math.random() > 0.4,
          glowColor: genAccentColor(70),

          effects: {

              enabled: Math.random() > 0.4,
              color: genAccentColor(70),
              intensity: parseFloat((Math.random() * 0.9 + 0.6).toFixed(2))
            },

              dx: Math.floor(Math.random() * 10) - 5,
              dy: Math.floor(Math.random() * 10) - 5,

              intensity: parseFloat((Math.random() * 0.8 + 0.5).toFixed(2))
            },

              enabled: Math.random() > 0.7,
              dx: Math.floor(Math.random() * 8) - 4,
              dy: Math.floor(Math.random() * 8) - 4,
              blur: Math.floor(Math.random() * 10) + 2,
              color: "#000000",
              opacity: parseFloat((Math.random() * 0.5 + 0.2).toFixed(2))
            },

              depth: Math.floor(Math.random() * 8) + 2,
              angle: Math.floor(Math.random() * 360),

              shadow: "#000000",

            }

            .val-label { font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.4); min-width: 36px; text-align: right; }
            .shape-picker { display: flex; gap: 6px; flex-wrap: wrap; }
            .shape-btn { padding: 7px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.5); font-family: 'Poppins', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.15s; text-transform: capitalize; -webkit-tap-highlight-color: transparent; touch-action: manipulation; min-height: 34px; }
            .shape-btn.active { background: rgba(255,200,40,0.15); border-color: rgba(255,200,40,0.5); color: #ffc828; }

            .toggle-row { display: flex; align-items: center; justify-content: space-between; min-height: 36px; }
            .toggle-row label { font-size: 12px; color: rgba(255,255,255,0.55); }
            .toggle { width: 44px; height: 24px; background: rgba(255,255,255,0.1); border-radius: 12px; border: none; cursor: pointer; position: relative; transition: background 0.2s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; flex-shrink: 0; }
            .toggle.on { background: #ffc828; }

            .toggle.on::after { transform: translateX(20px); }
            .toggle:focus-visible { outline: 2px solid #ffc828; outline-offset: 3px; }

            /* ── Font picker ── */
            .font-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
            .font-btn { padding: 8px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.15s; text-align: center; font-size: 13px; line-height: 1.2; -webkit-tap-highlight-color: transparent; }
            .font-btn .font-preview { font-size: 18px; display: block; margin-bottom: 3px; }
            .font-btn .font-label { font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.6; display: block; }
            .font-btn.active { background: rgba(255,200,40,0.15); border-color: rgba(255,200,40,0.5); color: #ffc828; }

            /* ── Export tab ── */

            .randomizer-locks .toggle-row { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .export-btn { display: flex; align-items: center; gap: 8px; justify-content: center; width: 100%; padding: 14px 20px; font-size: 13px; border-radius: 10px; min-height: 48px; }
            .btn-import { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.75); border: 1px solid rgba(255,255,255,0.15); font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; transition: all 0.15s; }

            .json-preview { background: #0a0812; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 14px; font-family: 'DM Mono', monospace; font-size: 10px; line-height: 1.65; color: rgba(160,224,128,0.75); white-space: pre; overflow-x: auto; overflow-y: auto; max-height: 220px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }

            /* ── Share toast ── */
            .share-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(20,15,36,0.95); border: 1px solid rgba(255,200,40,0.4); color: #ffc828; font-size: 13px; font-weight: 600; padding: 12px 22px; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100; pointer-events: none; animation: toastIn 0.2s ease; }
            .share-warning { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(20,15,36,0.95); border: 1px solid rgba(255,100,80,0.4); color: #ff8866; font-size: 12px; font-weight: 600; padding: 12px 20px; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100; display: flex; align-items: center; gap: 12px; animation: toastIn 0.2s ease; white-space: nowrap; }
            .share-warning .warn-btn { background: rgba(255,100,80,0.2); border: 1px solid rgba(255,100,80,0.4); color: #ff8866; font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
            .share-warning .warn-btn:hover { background: rgba(255,100,80,0.35); color: #ffaa88; }
            @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

            /* ── Mobile ── */
            @media (max-width: 768px) {
              body { height: 100dvh; overflow: hidden; }
              .app { display: flex; flex-direction: column; height: 100dvh; min-height: 100dvh; overflow: hidden; }
              .header { padding: 10px 14px; height: auto; gap: 8px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
              .header h1 { font-size: 16px; }

              .header-actions { gap: 6px; }
              .kofi-desktop { display: none; }
              .kofi-mobile { display: flex; }
              .canvas-area { padding: 14px 12px 12px; gap: 10px; background: #0c0a14; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }

              /* Mobile layout: centered preview. Sidebar dissolves via display:contents;
                 its desktop presets are hidden (mobile presets render inside .panel-content). */
              .canvas-row { flex-direction: column; flex-wrap: nowrap; align-items: center; gap: 10px; max-width: 100%; height: auto; width: 100%; }
              .canvas-sidebar { display: contents; }
              .canvas-sidebar > * { display: none; }
              .canvas-wrap { width: 100%; max-width: 100%; height: auto; flex: none; aspect-ratio: 1 / 1; border-radius: 16px; margin: 0; order: 1; }
              .canvas-action-overlay {
                top: 8px;
                right: 8px;
                flex-direction: row;
                gap: 4px;
                padding: 4px;
                background: rgba(20,15,36,0.7);
                border-color: rgba(255,255,255,0.08);
              }
              .canvas-action-overlay:hover {
                background: rgba(20,15,36,0.7);
              }
              .overlay-btn {
                padding: 5px 8px;
                font-size: 10px;
                background: rgba(255,255,255,0.06);
              }
              .overlay-btn-row {
                gap: 0;
              }
              .overlay-btn-row .overlay-btn {
                border-top-right-radius: 0;
                border-bottom-right-radius: 0;
                padding: 5px 6px;
              }
              .overlay-res-select {
                font-size: 8px;
                padding: 0 4px;
              }
              .canvas-action-overlay.hidden { opacity: 0; pointer-events: none; }

              /* Slimmer tab bar + tighter panel padding give the controls more
                 working area on every phone (requested for all mobile widths). */
              .tabs { height: 42px; }
              .tab { font-size: 9px; letter-spacing: 0.02em; padding: 0 3px; }
              .panel-content { padding: 14px 16px; gap: 16px; }
              .mobile-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

              .icon-btn[data-shortcut]::after { display: none; }
              .color-picker-popover { top: auto; right: 12px; bottom: 12px; left: 12px; transform: none; }
            }
            @media (max-width: 380px) {

              .control-row label { min-width: 76px; }
            }

            /* ── Wide / low-verticality phones (e.g. iPhone SE, Galaxy A35) ──

            @media (max-width: 768px) and (min-aspect-ratio: 0.55) {
              .canvas-area { flex-shrink: 0; padding: 10px 12px; }
              .canvas-row { flex-direction: row; flex-wrap: nowrap; align-items: center; justify-content: center; gap: 12px; width: 100%; max-width: 100%; }
              .canvas-wrap { order: 1; width: auto; height: auto; max-height: 42dvh; max-width: 62%; aspect-ratio: 1 / 1; flex: 0 1 auto; margin: 0; }
            }
          `}</style>

          <div className="app">
            <header className="header" role="banner">
              <h1>MONOGRAM STUDIO</h1>
              <span className="header-sub">Logo Generator</span>
              <div className="header-actions">

                  className="icon-btn icon-btn-action" onClick={resetToDefault} disabled={isDefault}

                >↺</button>

                  <button
                    className="icon-btn icon-btn-action" onClick={undo} disabled={!canUndo}
                    aria-label="Undo (Ctrl+Z)" title="Undo (Ctrl+Z)" data-shortcut="Ctrl+Z"
                  >↩</button>
                  <button
                    className="icon-btn icon-btn-action" onClick={redo} disabled={!canRedo}
                    aria-label="Redo (Ctrl+Y)" title="Redo (Ctrl+Y)" data-shortcut="Ctrl+Y"
                  >↪</button>
                </div>
                <a href="https://ko-fi.com/bankenichi" target="_blank" rel="noopener noreferrer" className="kofi-desktop" title="Support me on Ko-fi" aria-label="Support on Ko-fi">
                  <img src="https://raw.githubusercontent.com/bankenichi/Monogram-Logo-Generator/main/kofi%20logo.png" alt="Ko-fi" />
                </a>
              </div>
            </header>

            <main className="canvas-area" aria-label="Canvas area">
              <div className="canvas-row">
                {/* Desktop: presets in the left column.
                    Mobile: sidebar uses `display: contents`; desktop presets are hidden
                    (mobile presets are rendered separately inside .panel-content). */}
                <div className="canvas-sidebar">
                  <div className="section">
                    <div className="section-header" style={{cursor:"default"}}>
                      <span className="section-title">Presets</span>
                    </div>
                    {hasCustomized && !warnDismissed && (
                      <div className="preset-storage-warn">
                        <span>⚠</span> Custom presets are stored in browser storage. Export a preset bundle from the Export/Import tab to keep a backup.
                        <button className="warn-dismiss" onClick={() => setWarnDismissed(true)} aria-label="Dismiss warning">&times;</button>
                      </div>
                    )}
                    <div className="presets" role="list" aria-label="Design presets">
                      {presetSlots.map(slot => slot.name ? (
                        <div key={slot.slot} className="preset-slot-row">
                          <PresetThumb
                            preset={{ ...slot.settings, name: slot.name }}
                            active={settings.name === slot.name && settings.bgTop === slot.settings?.bgTop}
                            onClick={() => applyPreset(slot.settings)}
                            fontLoaded={fontLoaded}
