      const [debounced, setDebounced] = useState(value);
      useEffect(() => {
        const t = setTimeout(() => setDebounced(value), delay);
        return () => clearTimeout(t);
      }, [value, delay]);
      return debounced;

    // ── Utility ──
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return [r,g,b];
    }

    function createDynamicGradient(ctx, type, angle, stop, topColor, botColor, cx, cy, rLen, gLen) {
      let grad;
      const stopRatio = Math.max(0.01, Math.min(1, stop / 100));
      if (type === "linear") {
        const angleRad = (angle * Math.PI) / 180;
        const gx1 = cx - Math.cos(angleRad)*gLen/2;
        const gy1 = cy - Math.sin(angleRad)*gLen/2;
        const gx2 = cx + Math.cos(angleRad)*gLen/2;
        const gy2 = cy + Math.sin(angleRad)*gLen/2;
        grad = ctx.createLinearGradient(gx1,gy1,gx2,gy2);
      } else {
        grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, rLen);
      }
      grad.addColorStop(0, topColor);
      grad.addColorStop(stopRatio, botColor);
      if (stopRatio < 1) grad.addColorStop(1, botColor);
      return grad;
    }

    function drawTexture(ctx, texture, W, H) {
      if (texture === "none") return;
      ctx.save();
      if (texture === "crosshatch") {
        ctx.strokeStyle = "rgba(255,255,255,0.055)";
        ctx.lineWidth = 0.75;
        const spacing = 28;
        // diagonal lines in two directions
        for (let i = -H; i < W + H; i += spacing) {
          ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + H, H); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i - H, H); ctx.stroke();
        }
      } else if (texture === "dots") {
        ctx.fillStyle = "rgba(255,255,255,0.045)";
        const spacing = 22;
        for (let y = spacing/2; y < H; y += spacing) {
          for (let x = spacing/2; x < W; x += spacing) {
            ctx.beginPath();
            ctx.arc(x, y, 1.5, 0, Math.PI*2);
            ctx.fill();
          }
        }
      } else if (texture === "grid") {
        ctx.strokeStyle = "rgba(255,255,255,0.04)";
        ctx.lineWidth = 1;
        const spacing = 40;
        for (let x = 0; x < W; x += spacing) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
        }
        for (let y = 0; y < H; y += spacing) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        }
      } else if (texture === "lines") {
        ctx.strokeStyle = "rgba(255,255,255,0.04)";
        ctx.lineWidth = 1;
        const spacing = 18;
        for (let y = 0; y < H + W; y += spacing) {
          ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(y, 0); ctx.stroke();
        }
      }
      ctx.restore();
    }

    function getFontString(fontFamily, weight, size) {
      const font = FONTS.find(f => f.family === fontFamily) || FONTS[0];
      return `${font.weight} ${size}px '${font.family}', sans-serif`;
    }

    function drawMonogram(canvas, settings, exportSize) {
      const {
        bigLetter, name, shape,
        bgTop, bgBot, bgGradientType, bgGradientAngle, bgGradientStop,
        kTop, kBot, kGradientType, kGradientAngle, kGradientStop,
        nameTop, nameBot, nameGradientType, nameGradientAngle, nameGradientStop,
        outlineColor, ring1, ring2, ring1Width, ring2Width, ring1Gap, showRing1, showRing2,
        glow, glowColor, glowIntensity,
        letterSize, nameSize, letterSpacing, outlineWidth, nameOffsetY,
        letterOffsetX, letterOffsetY,
        fontFamily, texture,
      } = settings;

      const W = 700, H = 700;
      const size = exportSize || 700;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext("2d");
      if (size !== 700) ctx.scale(size / 700, size / 700);
      ctx.clearRect(0, 0, W, H);

      const cx = W/2, cy = H/2, R = W/2 - 16;

      // Background
      if (shape !== "none") {
        ctx.save();
        clipShape(ctx, shape, cx, cy, R);
        const bgGrad = createDynamicGradient(ctx, bgGradientType, bgGradientAngle, bgGradientStop, bgTop, bgBot, cx, cy, H*0.7, H);
        ctx.fillStyle = bgGrad;
        ctx.fill();

        // Texture overlay (clipped inside shape)
        drawTexture(ctx, texture, W, H);
        ctx.restore();

        // Rings
        if (showRing1) strokeShape(ctx, shape, cx, cy, R, ring1, ring1Width || 5);
        if (showRing2) strokeShape(ctx, shape, cx, cy, R - (ring1Gap || 18), ring2, ring2Width || 2);
      }

      // Big letter
      const letterFont = getFontString(fontFamily, 900, letterSize);
      ctx.font = letterFont;
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      const kX = cx + (letterOffsetX || 0);
      const kY = cy + (letterSize * 0.355) + (letterOffsetY || 0);

      if (glow) {
        const glowRgb = hexToRgb(glowColor);
        for (const [rad, alpha] of [[32,0.12],[18,0.2],[8,0.35]]) {
          ctx.save();
          ctx.shadowColor = `rgba(${glowRgb[0]},${glowRgb[1]},${glowRgb[2]},${alpha * glowIntensity})`;
          ctx.shadowBlur = rad * glowIntensity * 2;
          ctx.fillStyle = `rgba(${glowRgb[0]},${glowRgb[1]},${glowRgb[2]},0)`;
          ctx.fillText(bigLetter, kX, kY);
          ctx.restore();
        }
        ctx.save();
        ctx.shadowColor = `rgba(${glowRgb[0]},${glowRgb[1]},${glowRgb[2]},0.5)`;
        ctx.shadowBlur = 40 * glowIntensity;
        ctx.fillStyle = glowColor;
        ctx.fillText(bigLetter, kX, kY);
        ctx.restore();
      }

      const kGrad = createDynamicGradient(ctx, kGradientType, kGradientAngle, kGradientStop, kTop, kBot, cx, cy, H*0.45, H*0.8);
      ctx.fillStyle = kGrad;
      ctx.fillText(bigLetter, kX, kY);

      // Name text
      const nameFont = getFontString(fontFamily, 700, nameSize);
      ctx.font = nameFont;
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";
      ctx.letterSpacing = `${letterSpacing}px`;

      const nameY = cy + (nameSize * 0.355) + (nameOffsetY || 0);
      const nameX = cx + (letterSpacing / 2);

      ctx.lineJoin = "round";
      ctx.lineWidth = outlineWidth * 2;
      ctx.strokeStyle = outlineColor;
      ctx.strokeText(name, nameX, nameY);

      const nameGrad = createDynamicGradient(ctx, nameGradientType, nameGradientAngle, nameGradientStop, nameTop, nameBot, cx, nameY, nameSize*1.5, nameSize*2);
      ctx.fillStyle = nameGrad;
      ctx.fillText(name, nameX, nameY);
      ctx.letterSpacing = "0px";
    }

    // ── Font loader for SVG path conversion ──
    // Maps font family → woff2 path. Each entry matches the @font-face block in <head>.
    // For Poppins we point at the 900-weight file because the big letter is rendered at weight 900.
    const FONT_FILES = {
      "Poppins":           "./fonts/poppins-v24-latin-900.woff2",
      "Playfair Display":  "./fonts/playfair-display-sc-v18-latin-700.woff2",
      "Bebas Neue":        "./fonts/bebas-neue-v16-latin-regular.woff2",
      "Cinzel":            "./fonts/cinzel-v26-latin-700.woff2",
      "Dancing Script":    "./fonts/dancing-script-v29-latin-700.woff2",
      "Space Mono":        "./fonts/space-mono-v17-latin-700.woff2",
      "Cormorant Upright": "./fonts/cormorant-upright-v19-latin-700.woff2",
      "Abril Fatface":     "./fonts/abril-fatface-v25-latin-regular.woff2",
    };

    // Cache parsed Typr font objects. fetch+parse runs at most once per family.
    const _parsedFontCache = new Map();
    async function loadParsedFont(fontFamily) {
      if (_parsedFontCache.has(fontFamily)) return _parsedFontCache.get(fontFamily);
      if (typeof Typr === "undefined") throw new Error("Typr.js not loaded");
      
      const path = FONT_FILES[fontFamily] || FONT_FILES["Poppins"];
      const resp = await fetch(path);
      if (!resp.ok) throw new Error(`Font fetch failed: ${path} (${resp.status})`);
      
      const buffer = await resp.arrayBuffer();
      
      // Ensure the WebAssembly module has loaded globally
      if (typeof Module === "undefined" || !Module.decompress) {
        throw new Error("wawoff2 WASM module (Module) is not ready or loaded.");
      }
      
      // Decompress the .woff2 bytes
      const decompressedData = Module.decompress(new Uint8Array(buffer));
      
      // CRITICAL: Clone the data out of the WebAssembly heap allocation 
      // into a fresh, exact-sized ArrayBuffer for Typr to read safely
      const cleanBuffer = Uint8Array.from(decompressedData).buffer;
      
      const parsed = Typr.parse(cleanBuffer);
      
      // Typr.parse returns an array for font collections; standalone fonts return a single-item array
      const font = Array.isArray(parsed) ? parsed[0] : parsed;
      _parsedFontCache.set(fontFamily, font);
      return font;
    }

    // Render `text` as a single SVG <path> element (one combined d string so a single
    // gradient/fill spans the whole text run, matching the original <text> behavior).
    // Returns { pathD, width } in root SVG coordinates (px), with the
    // scale+translate transform baked directly into the path data.
    // This avoids <g transform> wrappers that break userSpaceOnUse gradients.
    //
    //   anchor: "start" | "middle" | "end"
    //   letterSpacing: extra px inserted between each glyph (matches canvas/SVG letter-spacing)
    function textToCombinedPathD(font, text, fontSize, baselineX, baselineY, letterSpacing = 0, anchor = "middle") {
      const unitsPerEm = font.head.unitsPerEm;
      const scale = fontSize / unitsPerEm;
      const letterSpacingUnits = letterSpacing / scale;

      // Walk codepoints (handles BMP-only — full surrogate-pair support not needed for
      // the names + Latin letters this app supports).
      const glyphs = [];
      let advanceTotal = 0;
      for (const ch of text) {
        const cp = ch.codePointAt(0);
        const gid = Typr.U.codeToGlyph(font, cp);
        const gpath = Typr.U.glyphToPath(font, gid);
        const aWidth = (font.hmtx && font.hmtx.aWidth && font.hmtx.aWidth[gid] != null)
          ? font.hmtx.aWidth[gid] : 0;
        glyphs.push({ gpath, aWidth });
        advanceTotal += aWidth + letterSpacingUnits;
      }
      // Trailing letter-spacing shouldn't widen the run
      if (glyphs.length > 0) advanceTotal -= letterSpacingUnits;

      const totalWidthPx = advanceTotal * scale;

      // Merge each glyph's path into one cmds/crds pair, with each glyph's coordinates
      // translated by the running advance cursor (in font units).
      const mergedCmds = [];
      const mergedCrds = [];
      let xCursor = 0;
      for (const { gpath, aWidth } of glyphs) {
        if (gpath && gpath.cmds && gpath.crds) {
          for (let i = 0; i < gpath.cmds.length; i++) mergedCmds.push(gpath.cmds[i]);
          for (let i = 0; i < gpath.crds.length; i += 2) {
            mergedCrds.push(gpath.crds[i] + xCursor);
            mergedCrds.push(gpath.crds[i + 1]);
          }
        }
        xCursor += aWidth + letterSpacingUnits;
      }

      // Horizontal anchor offset in px
      let xOffsetPx = 0;
      if (anchor === "middle") xOffsetPx = -totalWidthPx / 2;
      else if (anchor === "end") xOffsetPx = -totalWidthPx;

      // Bake the transform directly into the coordinates: scale(s, -s) then translate(tx, ty).
      // This produces root SVG coordinates so userSpaceOnUse gradients align correctly.
      const tx = baselineX + xOffsetPx;
      const ty = baselineY;
      for (let i = 0; i < mergedCrds.length; i += 2) {
        mergedCrds[i]     = mergedCrds[i]     * scale + tx;
        mergedCrds[i + 1] = mergedCrds[i + 1] * (-scale) + ty;
      }

      const pathD = Typr.U.pathToSVG({ cmds: mergedCmds, crds: mergedCrds }, 2);
      return { pathD, width: totalWidthPx };
    }

    // ── SVG Export ──
    function buildShapeSVGPath(shape, cx, cy, R) {
      switch(shape) {
        case "circle": return `M ${cx} ${cy} m -${R} 0 a ${R} ${R} 0 1 0 ${R*2} 0 a ${R} ${R} 0 1 0 -${R*2} 0`;
        case "square": return `M ${cx-R} ${cy-R} h ${R*2} v ${R*2} h -${R*2} Z`;
        case "rounded-square": {
          const r = R*0.18;
          return `M ${cx-R+r} ${cy-R} L ${cx+R-r} ${cy-R} Q ${cx+R} ${cy-R} ${cx+R} ${cy-R+r} L ${cx+R} ${cy+R-r} Q ${cx+R} ${cy+R} ${cx+R-r} ${cy+R} L ${cx-R+r} ${cy+R} Q ${cx-R} ${cy+R} ${cx-R} ${cy+R-r} L ${cx-R} ${cy-R+r} Q ${cx-R} ${cy-R} ${cx-R+r} ${cy-R} Z`;
        }
        case "diamond": return `M ${cx} ${cy-R} L ${cx+R} ${cy} L ${cx} ${cy+R} L ${cx-R} ${cy} Z`;
        case "hexagon": {
          const pts = [];
          for (let i=0; i<6; i++) {
            const a = (Math.PI/3)*i - Math.PI/6;
            pts.push(`${cx+R*Math.cos(a)} ${cy+R*Math.sin(a)}`);
          }
          return `M ${pts.join(" L ")} Z`;
        }
        case "triangle": {
          const p1 = `${cx} ${cy-R}`;
          const p2 = `${cx+R*Math.cos(Math.PI/6)} ${cy+R*Math.sin(Math.PI/6)}`;
          const p3 = `${cx-R*Math.cos(Math.PI/6)} ${cy+R*Math.sin(Math.PI/6)}`;
          return `M ${p1} L ${p2} L ${p3} Z`;
        }
        case "pentagram": {
          let d = "";
          for (let i=0; i<5; i++) {
            const a = -Math.PI/2 + i*2*Math.PI/5;
            const px = cx+R*Math.cos(a), py = cy+R*Math.sin(a);
            const a2 = a + Math.PI/5;
            const r2 = R*0.382;
            const px2 = cx+r2*Math.cos(a2), py2 = cy+r2*Math.sin(a2);
            d += (i===0 ? `M ${px} ${py}` : ` L ${px} ${py}`) + ` L ${px2} ${py2}`;
          }
          return d + " Z";
        }
        case "hexagram": {
          let d = "";
          for (let i=0; i<6; i++) {
            const a = -Math.PI/2 + i*2*Math.PI/6;
            const px = cx+R*Math.cos(a), py = cy+R*Math.sin(a);
            const a2 = a + Math.PI/6;
            const r2 = R*0.577;
            const px2 = cx+r2*Math.cos(a2), py2 = cy+r2*Math.sin(a2);
            d += (i===0 ? `M ${px} ${py}` : ` L ${px} ${py}`) + ` L ${px2} ${py2}`;
          }
          return d + " Z";
        }
        default: return `M ${cx} ${cy} m -${R} 0 a ${R} ${R} 0 1 0 ${R*2} 0 a ${R} ${R} 0 1 0 -${R*2} 0`;
      }
    }

    async function exportSVG(settings) {
      const {
        bigLetter, name, shape,
        bgTop, bgBot, bgGradientType, bgGradientAngle, bgGradientStop,
        kTop, kBot, kGradientType, kGradientAngle, kGradientStop,
        nameTop, nameBot, nameGradientType, nameGradientAngle, nameGradientStop,
        outlineColor, ring1, ring2, ring1Width, ring2Width, ring1Gap, showRing1, showRing2,
        glow, glowColor, glowIntensity,
        letterSize, nameSize, letterSpacing, outlineWidth, nameOffsetY,
        letterOffsetX, letterOffsetY,
        fontFamily, texture,
      } = settings;

      const W = 700, H = 700, cx = 350, cy = 350, R = 334;
      const font = FONTS.find(f => f.family === fontFamily) || FONTS[0];

      // Canvas uses weight 900 for big letter, font.weight for name — match that exactly
      const letterWeight = 900;
      const nameWeight = font.weight;

      const kX = cx + (letterOffsetX || 0);
      const kY = cy + letterSize * 0.355 + (letterOffsetY || 0);
      const nameY = cy + nameSize * 0.355 + (nameOffsetY || 0);
      const nameX = cx + (letterSpacing / 2);

      const shapePath = buildShapeSVGPath(shape, cx, cy, R);
      const ring2R = R - (ring1Gap || 18);

      // Gradient helper — respects linear vs radial for all three gradients.
      // Uses userSpaceOnUse so the angle is always accurate regardless of the
      // element's bounding-box aspect ratio (objectBoundingBox distorts non-square
      // elements like text paths). Mirrors createDynamicGradient on the canvas side.
      // gCx/gCy: centre of the gradient in SVG user-space px.
      // rLen: radius for radial gradients. gLen: full span for linear gradients.
      function buildGradientDef(id, type, angle, stop, topColor, botColor, gCx, gCy, rLen, gLen) {
        const stopRatio = Math.max(0.01, Math.min(1, (stop ?? 100) / 100)) * 100;

        if (type === "radial") {
          return `<radialGradient id="${id}" cx="${gCx}" cy="${gCy}" r="${rLen}" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="${topColor}"/>
          <stop offset="${stopRatio}%" stop-color="${botColor}"/>
          ${stopRatio < 100 ? `<stop offset="100%" stop-color="${botColor}"/>` : ""}
          </radialGradient>`;
        }

        // Convert angle (degrees, CSS convention) to x1/y1/x2/y2 in pixel space.
        // Using ?? 90 (not || 90) so that 0° is not accidentally replaced with 90°.
        const angleRad = ((angle ?? 90) * Math.PI) / 180;
        const x1 = gCx - Math.cos(angleRad) * gLen / 2;
        const y1 = gCy - Math.sin(angleRad) * gLen / 2;
        const x2 = gCx + Math.cos(angleRad) * gLen / 2;
        const y2 = gCy + Math.sin(angleRad) * gLen / 2;
        return `<linearGradient id="${id}" x1="${x1.toFixed(2)}" y1="${y1.toFixed(2)}" x2="${x2.toFixed(2)}" y2="${y2.toFixed(2)}" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="${topColor}"/>
          <stop offset="${stopRatio}%" stop-color="${botColor}"/>
          ${stopRatio < 100 ? `<stop offset="100%" stop-color="${botColor}"/>` : ""}
          </linearGradient>`;
      }

      // Glow filter — tinted with glowColor, multi-pass like canvas shadow layers
      const glowFilter = glow ? `
    <filter id="glowFilter" x="-60%" y="-60%" width="220%" height="220%">
      <feFlood flood-color="${glowColor}" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="SourceGraphic" operator="in" result="coloredSrc"/>
      <feGaussianBlur in="coloredSrc" stdDeviation="${40 * (glowIntensity || 1)}" result="blur1"/>
      <feGaussianBlur in="coloredSrc" stdDeviation="${18 * (glowIntensity || 1)}" result="blur2"/>
      <feGaussianBlur in="coloredSrc" stdDeviation="${8 * (glowIntensity || 1)}" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur3"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>` : "";

      // Texture patterns — clipped to shape on the background rect only
      function buildTexturePattern() {
        if (!texture || texture === "none") return "";
        switch (texture) {
          case "crosshatch":
            return `<pattern id="texPattern" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <line x1="0" y1="28" x2="28" y2="0" stroke="rgba(255,255,255,0.055)" stroke-width="0.75"/>
      <line x1="0" y1="0" x2="28" y2="28" stroke="rgba(255,255,255,0.055)" stroke-width="0.75"/>
    </pattern>`;
          case "dots":
            return `<pattern id="texPattern" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1.5" fill="rgba(255,255,255,0.045)"/>
    </pattern>`;
          case "grid":
            return `<pattern id="texPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>`;
          case "lines":
            return `<pattern id="texPattern" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <line x1="0" y1="18" x2="18" y2="0" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>`;
          default: return "";
        }
      }
      const texturePattern = buildTexturePattern();
      // Texture rect uses clip-path — background only, same as canvas ctx.clip() scope
      const textureOverlay = (texturePattern && texture !== "none")
        ? `\n  <!-- Texture overlay -->\n  <rect x="0" y="0" width="${W}" height="${H}" fill="url(#texPattern)" clip-path="url(#shapeClip)"/>`
        : "";

      // Convert big letter + name to outline <path>s via Typr.js. If anything fails
      // (Typr not loaded, font fetch error, parse error), fall back to <text> so the
      // export still produces a usable file — it just won't be font-independent.
      let bigLetterSVG = "";
      let nameSVG = "";
      try {
        const parsedFont = await loadParsedFont(font.family);
        const big  = textToCombinedPathD(parsedFont, bigLetter || "", letterSize, kX, kY, 0, "middle");
        const nm   = textToCombinedPathD(parsedFont, name || "",      nameSize,   cx, nameY, letterSpacing, "middle");

        bigLetterSVG = `<path d="${big.pathD}" fill="url(#kGrad)" ${glow ? 'filter="url(#glowFilter)"' : ""}/>`;

        // Name: stroke + fill via paint-order so the outline sits behind the fill,
        // matching canvas behavior. Path is in root SVG coords so stroke-width is
        // direct px (canvas uses outlineWidth * 2).
        nameSVG = `<path d="${nm.pathD}"
      fill="url(#nameGrad)"
      stroke="${outlineColor}"
      stroke-width="${outlineWidth * 2}"
      stroke-linejoin="round"
      paint-order="stroke fill"/>`;
      } catch (err) {
        console.warn("[Monogram] Typr.js font conversion failed; falling back to <text> in SVG.", err);
        bigLetterSVG = `<text x="${kX}" y="${kY}" text-anchor="middle"
    font-family="'${font.family}', sans-serif" font-size="${letterSize}" font-weight="${letterWeight}"
    fill="url(#kGrad)" ${glow ? 'filter="url(#glowFilter)"' : ""}>${bigLetter}</text>`;
        nameSVG = `<text x="${nameX}" y="${nameY}" text-anchor="middle"
    font-family="'${font.family}', sans-serif" font-size="${nameSize}" font-weight="${nameWeight}"
    letter-spacing="${letterSpacing}"
    stroke="${outlineColor}" stroke-width="${outlineWidth * 2}" stroke-linejoin="round"
    paint-order="stroke fill" fill="url(#nameGrad)">${name}</text>`;
      }

      const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
  <defs>
    ${buildGradientDef("bgGrad",   bgGradientType,   bgGradientAngle,   bgGradientStop,   bgTop,   bgBot,   cx,    cy,     H*0.7,       H)}
    ${buildGradientDef("kGrad",    kGradientType,    kGradientAngle,    kGradientStop,    kTop,    kBot,    cx,    cy,     H*0.45,      H*0.8)}
    ${buildGradientDef("nameGrad", nameGradientType, nameGradientAngle, nameGradientStop, nameTop, nameBot, cx,    nameY,  nameSize*1.5, nameSize*2)}
    <clipPath id="shapeClip"><path d="${shapePath}"/></clipPath>
    ${texturePattern}${glowFilter}
  </defs>

  ${shape !== "none" ? `
  <!-- Background (clipped to shape) -->
  <path d="${shapePath}" fill="url(#bgGrad)"/>${textureOverlay}

  <!-- Rings (NOT clipped — drawn outside shape same as canvas) -->
  ${showRing1 ? `<path d="${shapePath}" fill="none" stroke="${ring1}" stroke-width="${ring1Width || 5}"/>` : ""}
  ${showRing2 ? `<path d="${buildShapeSVGPath(shape, cx, cy, ring2R)}" fill="none" stroke="${ring2}" stroke-width="${ring2Width || 2}"/>` : ""}
  ` : ""}

  <!-- Big Letter (vector paths — font-independent) -->
  ${bigLetterSVG}

  <!-- Name Text (vector paths — font-independent) -->
  ${nameSVG}
</svg>`;

      const blob = new Blob([svgContent], { type: "image/svg+xml" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.download = `monogram_${settings.bigLetter || 'logo'}_${settings.name || 'design'}.svg`;
      link.href = url;
      link.click();
      URL.revokeObjectURL(url);
    }

    function clipShape(ctx, shape, cx, cy, R) {
      ctx.beginPath();
      buildShapePath(ctx, shape, cx, cy, R);
      ctx.clip();
    }

    function strokeShape(ctx, shape, cx, cy, R, color, width) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      buildShapePath(ctx, shape, cx, cy, R);
      ctx.stroke();
      ctx.restore();
    }

    function buildShapePath(ctx, shape, cx, cy, R) {
      switch(shape) {
        case "circle": ctx.arc(cx, cy, R, 0, Math.PI*2); break;
        case "square": ctx.rect(cx-R, cy-R, R*2, R*2); break;
        case "rounded-square": {
          const r = R*0.18;
          ctx.moveTo(cx-R+r, cy-R); ctx.lineTo(cx+R-r, cy-R); ctx.arcTo(cx+R, cy-R, cx+R, cy-R+r, r);
          ctx.lineTo(cx+R, cy+R-r); ctx.arcTo(cx+R, cy+R, cx+R-r, cy+R, r);
          ctx.lineTo(cx-R+r, cy+R); ctx.arcTo(cx-R, cy+R, cx-R, cy+R-r, r);
          ctx.lineTo(cx-R, cy-R+r); ctx.arcTo(cx-R, cy-R, cx-R+r, cy-R, r); ctx.closePath(); break;
        }
        case "diamond": ctx.moveTo(cx, cy-R); ctx.lineTo(cx+R, cy); ctx.lineTo(cx, cy+R); ctx.lineTo(cx-R, cy); ctx.closePath(); break;
        case "hexagon": {
          for (let i=0; i<6; i++) { const a=(Math.PI/3)*i-Math.PI/6, px=cx+R*Math.cos(a), py=cy+R*Math.sin(a); i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
          ctx.closePath(); break;
        }
        case "triangle": ctx.moveTo(cx, cy-R); ctx.lineTo(cx+R*Math.cos(Math.PI/6), cy+R*Math.sin(Math.PI/6)); ctx.lineTo(cx-R*Math.cos(Math.PI/6), cy+R*Math.sin(Math.PI/6)); ctx.closePath(); break;
        case "pentagram": {
          for (let i=0; i<5; i++) {
            const a=-Math.PI/2+(i*2*Math.PI/5), px=cx+R*Math.cos(a), py=cy+R*Math.sin(a);
            i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
            const a2=a+Math.PI/5, r2=R*0.382; ctx.lineTo(cx+r2*Math.cos(a2), cy+r2*Math.sin(a2));
          }
          ctx.closePath(); break;
        }
        case "hexagram": {
          for (let i=0; i<6; i++) {
            const a=-Math.PI/2+(i*2*Math.PI/6), px=cx+R*Math.cos(a), py=cy+R*Math.sin(a);
            i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
            const a2=a+Math.PI/6, r2=R*0.577; ctx.lineTo(cx+r2*Math.cos(a2), cy+r2*Math.sin(a2));
          }
          ctx.closePath(); break;
        }
      }
    }

    // ── Preset thumbnail renderer ──
    function PresetThumb({ preset, active, onClick, fontLoaded }) {
      const canvasRef = useRef(null);
      useEffect(() => {
        // Only draw once the main app confirms fonts are loaded
        if (!canvasRef.current || !fontLoaded) return; 
        const canvas = canvasRef.current;
        drawMonogram(canvas, { ...DEFAULT_SETTINGS, ...preset });
      }, [preset, fontLoaded]); // Add fontLoaded as a dependency
      return (
        <button
          className={`preset-btn ${active ? "active" : ""}`}
          onClick={onClick}
          aria-label={`Apply preset: ${preset.name}`}
          title={preset.name}
        >
          <canvas ref={canvasRef} className="preset-thumb" />
          <span className="preset-name">{preset.name}</span>
        </button>
      );
    }

    // ── URL share encode/decode ──
    function encodeSettings(s) {
      try { return btoa(unescape(encodeURIComponent(JSON.stringify(s)))); } catch { return null; }
    }
    function decodeSettings(str) {
      try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } catch { return null; }
    }

    // ── HSL-to-HEX ──
    const hslToHex = (h, s, l) => {
      l /= 100;
      const a = s * Math.min(l, 1 - l) / 100;
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    };

    // ── UI Components ──
    function ColorRow({ label, value, onChange }) {
      return (
        <div className="control-row">
          <label>{label}</label>
          <div className="color-input-wrap">
            <input type="color" value={value} onChange={e=>onChange(e.target.value)} aria-label={label} />
            <span className="hex-label" aria-hidden="true">{value}</span>
          </div>
        </div>
      );
    }

    function SliderRow({ label, value, min, max, step=1, onChange, unit="" }) {
      const id = `slider-${label.replace(/\s+/g,"-").toLowerCase()}`;
      return (
        <div className="control-row">
          <label htmlFor={id}>{label}</label>
          <div className="slider-wrap">
            <input id={id} type="range" min={min} max={max} step={step} value={value}
              onChange={e=>onChange(Number(e.target.value))}
              aria-label={`${label}: ${value}${unit}`} />
            <span className="val-label" aria-hidden="true">{value}{unit}</span>
          </div>
        </div>
      );
    }

    function App() {
      const canvasRef = useRef(null);
      const [tab, setTab] = useState("design");
      const [fontLoaded, setFontLoaded] = useState(false);
      const [shareToast, setShareToast] = useState(false);
      const [shareWarning, setShareWarning] = useState(null);
      const [importError, setImportError] = useState(null);
      const [importSuccess, setImportSuccess] = useState(false);
      const [pngRes, setPngRes] = useState(700);

      // ── Load from URL hash or localStorage ──
      const getInitialSettings = () => {
        // URL hash takes priority
        const hash = window.location.hash.slice(1);
        if (hash.startsWith("config=")) {
          const decoded = decodeSettings(hash.slice(7));
          if (decoded && decoded.bgTop) return { ...DEFAULT_SETTINGS, ...decoded };
        }
        // Then localStorage
        try {
          const saved = localStorage.getItem("monogram-studio-settings");
          if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.bgTop) return { ...DEFAULT_SETTINGS, ...parsed };
          }
        } catch {}
        return DEFAULT_SETTINGS;
      };

      const [settings, setSettings] = useState(getInitialSettings);

      // ── Undo/redo history ──
      const historyRef = useRef([settings]);
      const historyIndexRef = useRef(0);

      const set = useCallback((key, val) => {
        setSettings(s => {
          const next = { ...s, [key]: val };
          // Trim forward history on new change
          historyRef.current = historyRef.current.slice(0, historyIndexRef.current + 1);
          historyRef.current.push(next);
          if (historyRef.current.length > 100) historyRef.current.shift();
          historyIndexRef.current = historyRef.current.length - 1;
          return next;
        });
      }, []);

      const undo = useCallback(() => {
        if (historyIndexRef.current > 0) {
          historyIndexRef.current--;
          setSettings(historyRef.current[historyIndexRef.current]);
        }
      }, []);

      const redo = useCallback(() => {
        if (historyIndexRef.current < historyRef.current.length - 1) {
          historyIndexRef.current++;
          setSettings(historyRef.current[historyIndexRef.current]);
        }
      }, []);

      const resetToDefault = useCallback(() => {
        setSettings(s => {
          const next = { ...DEFAULT_SETTINGS };
          historyRef.current = historyRef.current.slice(0, historyIndexRef.current + 1);
          historyRef.current.push(next);
          if (historyRef.current.length > 100) historyRef.current.shift();
          historyIndexRef.current = historyRef.current.length - 1;
          return next;
        });
      }, []);

      // Keyboard shortcuts for undo/redo
      useEffect(() => {
        const handler = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.shiftKey) { e.preventDefault(); undo(); }
          if ((e.ctrlKey || e.metaKey) && (e.key === "y" || (e.key === "z" && e.shiftKey))) { e.preventDefault(); redo(); }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [undo, redo]);

      // ── Auto-save to localStorage ──
      useEffect(() => {
        try { localStorage.setItem("monogram-studio-settings", JSON.stringify(settings)); } catch {}
      }, [settings]);

      // ── Font loading ──
      useEffect(() => {
        const fontsToLoad = FONTS.map(f => document.fonts.load(`${f.weight} 10px '${f.family}'`));
        document.fonts.ready.then(() => {
          Promise.all(fontsToLoad).then(() => setFontLoaded(true)).catch(() => setFontLoaded(true));
        });
      }, []);

      const debouncedSettings = useDebounce(settings, 0);

      useEffect(() => {
        if (!fontLoaded || !canvasRef.current) return;
        drawMonogram(canvasRef.current, debouncedSettings);
      }, [debouncedSettings, fontLoaded]);

      const applyPreset = useCallback((preset) => {
        setSettings(s => {
          const next = { ...s, ...preset };
          historyRef.current = historyRef.current.slice(0, historyIndexRef.current + 1);
          historyRef.current.push(next);
          historyIndexRef.current = historyRef.current.length - 1;
          return next;
        });
      }, []);

      const downloadPNG = () => {
        const size = pngRes;
        const canvas = document.createElement("canvas");
        drawMonogram(canvas, settings, size);
        const link = document.createElement("a");
        const suffix = size !== 700 ? `_${size}x${size}` : "";
        link.download = `monogram_${settings.bigLetter || 'logo'}_${settings.name || 'design'}${suffix}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      };

      const downloadSVG = async () => {
        try { await exportSVG(settings); }
        catch (err) { console.error("SVG export failed:", err); }
      };

      const shareURL = () => {
        const encoded = encodeSettings(settings);

            /* ── Mobile ── */
            @media (max-width: 768px) {
              body { height: 100dvh; overflow: hidden; }
              .app { display: flex; flex-direction: column; height: 100dvh; min-height: 100dvh; overflow: hidden; }
              .header { padding: 10px 14px; height: auto; gap: 8px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
              .header h1 { font-size: 16px; }
              .header-sub { display: none; }
              .header-actions { gap: 6px; }
              .kofi-desktop { display: none; }
              .kofi-mobile { display: flex; }
              .canvas-area { padding: 14px 12px 12px; gap: 10px; background: #0c0a14; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }

              /* Mobile layout: centered preview, action buttons as horizontal row below.
                 .canvas-sidebar dissolves via display:contents so .canvas-actions
                 becomes a direct child of .canvas-row; its desktop presets bits are
                 hidden (mobile presets render inside .panel-content instead). */
              .canvas-row { flex-direction: column; flex-wrap: nowrap; align-items: center; gap: 10px; max-width: 100%; height: auto; width: 100%; }
              .canvas-sidebar { display: contents; }
              .canvas-sidebar > .presets-label,
              .canvas-sidebar > .presets { display: none; }
              .canvas-wrap { width: 100%; max-width: 100%; height: auto; flex: none; aspect-ratio: 1 / 1; border-radius: 16px; margin: 0; order: 1; }
              .canvas-actions { display: flex; flex-direction: row; gap: 6px; width: 100%; max-width: 100%; margin-top: 0; flex-shrink: 0; order: 2; }
              .canvas-actions .btn { flex: 1; padding: 7px 6px; font-size: 11px; min-width: 0; }

              /* Slimmer tab bar + tighter panel padding give the controls more
                 working area on every phone (requested for all mobile widths). */
              .tabs { height: 42px; }
              .panel-content { padding: 14px 16px; gap: 16px; }
              .png-row { flex: 7; }
              .png-row .btn { flex: 6; font-size: 10px; padding: 10px 4px; }
              .res-select { flex: 1; font-size: 9px; padding: 3px 4px; min-width: 0; }
              .canvas-actions .btn-secondary,
              .canvas-actions .btn-share { flex: 6; }
              .mobile-presets-wrap { display: block; }
              .mobile-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
              .font-grid { grid-template-columns: 1fr 1fr 1fr; }
              .icon-btn[data-shortcut]::after { display: none; }
            }
            @media (max-width: 380px) {
              .header h1 { font-size: 14px; }
              .canvas-wrap { flex: none; aspect-ratio: 1 / 1; width: 100%; height: auto; max-width: 100%; }
              .canvas-actions .btn { padding: 9px 4px; font-size: 10px; }
              .png-row .btn { padding: 9px 3px; font-size: 9px; }
              .res-select { font-size: 8px; padding: 2px 3px; }
              .canvas-actions .btn-secondary,
              .canvas-actions .btn-share { flex: 6; }
              .control-row label { min-width: 76px; }
            }

            /* ── Wide / low-verticality phones (e.g. iPhone SE, Galaxy A35) ──
               These viewports are short relative to their width, so the
               stacked square preview + action row eats the whole screen.
               When the aspect ratio is wide enough, put the action buttons
               back in a column sidebar beside a height-capped preview so the
               controls panel keeps usable room below. */
            @media (max-width: 768px) and (min-aspect-ratio: 0.55) {
              .canvas-area { flex-shrink: 0; padding: 10px 12px; }
              .canvas-row { flex-direction: row; flex-wrap: nowrap; align-items: center; justify-content: center; gap: 12px; width: 100%; max-width: 100%; }
              .canvas-wrap { order: 1; width: auto; height: auto; max-height: 42dvh; max-width: 62%; aspect-ratio: 1 / 1; flex: 0 1 auto; margin: 0; }
              .canvas-actions { order: 2; flex-direction: column; width: auto; min-width: 130px; max-width: 168px; flex: 0 0 auto; gap: 6px; margin-top: 0; }
              .canvas-actions .btn { flex: none; width: 100%; padding: 8px 10px; }
              .png-row { flex-direction: row; width: 100%; }
              .png-row .btn { flex: 6; }
              .res-select { flex: 1; }
            }
          `}</style>

          <div className="app">
            <header className="header" role="banner">
              <h1>MONOGRAM STUDIO</h1>
              <span className="header-sub">Logo Generator</span>
              <div className="header-actions">
                <button
                  className="icon-btn" onClick={resetToDefault} disabled={isDefault}
                  aria-label="Reset to default" title="Reset to default"
                >↺</button>
                <div className="undo-redo" role="group" aria-label="Undo and redo">
                  <button
                    className="icon-btn" onClick={undo} disabled={!canUndo}
                    aria-label="Undo (Ctrl+Z)" title="Undo (Ctrl+Z)" data-shortcut="Ctrl+Z"
                  >↩</button>
                  <button
                    className="icon-btn" onClick={redo} disabled={!canRedo}
                    aria-label="Redo (Ctrl+Y)" title="Redo (Ctrl+Y)" data-shortcut="Ctrl+Y"
                  >↪</button>
                </div>
                <a href="https://ko-fi.com/bankenichi" target="_blank" rel="noopener noreferrer" className="kofi-desktop" title="Support me on Ko-fi" aria-label="Support on Ko-fi">
                  <img src="https://raw.githubusercontent.com/bankenichi/Monogram-Logo-Generator/main/kofi%20logo.png" alt="Ko-fi" />
                </a>
              </div>
            </header>

            <main className="canvas-area" aria-label="Canvas area">
              <div className="canvas-row">
                {/* Desktop: presets + actions share the left column.
                    Mobile: sidebar uses `display: contents` so .canvas-actions
                    promotes into canvas-row and presets-label/presets are hidden
                    (mobile presets are rendered separately inside .panel-content). */}
                <div className="canvas-sidebar">
                  <div className="presets-label" aria-hidden="true">Presets</div>
                  <div className="presets" role="list" aria-label="Design presets">
                    {PRESETS.map(p => (
                      <PresetThumb
                        key={p.name}
                        preset={p}
                        active={settings.name === p.name && settings.bgTop === p.bgTop}
                        onClick={() => applyPreset(p)}
                        fontLoaded={fontLoaded}
                      />
                    ))}
                  </div>

                  <div className="canvas-actions">
                    <div className="png-row">
                      <button className="btn btn-primary" onClick={downloadPNG} aria-label="Download PNG">
                        <span aria-hidden="true">↓</span> PNG <span className="res-label">{pngRes}×{pngRes}</span>
                      </button>
                      <select className="res-select" value={pngRes} onChange={e => setPngRes(Number(e.target.value))} aria-label="PNG resolution">
                        <option value={700}>1×</option>
                        <option value={1400}>2×</option>
                        <option value={2800}>4×</option>
                      </select>
                    </div>
                    <button className="btn btn-secondary" onClick={downloadSVG} aria-label="Download SVG">
                      <span aria-hidden="true">↓</span> SVG
                    </button>
                    <button className="btn btn-share" onClick={shareURL} aria-label="Copy shareable link">
                      <span aria-hidden="true">⎘</span> Share
                    </button>
                  </div>
                </div>

                {/* Preview */}
                <div className="canvas-wrap" role="img">
                  <canvas ref={canvasRef} />
                </div>
              </div>
            </main>

            <div className="panel" role="complementary" aria-label="Design controls">
              <div className="tabs" role="tablist" aria-label="Control panels">
                {["design","colors","export/import"].map(t => (
                  <button
                    key={t}
                    role="tab"
                    aria-selected={tab === t}
                    className={`tab ${tab===t?"active":""}`}
                    onClick={()=>setTab(t)}
                  >{t}</button>
                ))}
              </div>

              <div className="panel-content" role="tabpanel">
                {/* Mobile-only: presets at top of scrollable panel content.
                    Hidden on export/import tab to give room for the import/export UI. */}
                {tab !== "export/import" && (
                  <div className="mobile-presets-wrap">
                    <div className="presets-label mobile-presets-label" aria-hidden="true">Presets</div>
                    <div className="presets mobile-presets" role="list" aria-label="Design presets">
                      {PRESETS.map(p => (
                        <PresetThumb
                          key={p.name}
                          preset={p}
                          active={settings.name === p.name && settings.bgTop === p.bgTop}
                          onClick={() => applyPreset(p)}
                          fontLoaded={fontLoaded}
                        />
                      ))}
                    </div>
                  </div>
                )}

                {tab === "design" && (
                  <>
                    <div className="section">
                      <div className="section-title">Content</div>
                      <div className="control-row">
                        <label htmlFor="input-letter">Big Letter</label>
                        <input id="input-letter" className="text-input" style={{maxWidth:60,textAlign:"center",fontSize:20}}
                          maxLength={2} value={settings.bigLetter}
                          onChange={e=>set("bigLetter", e.target.value.toUpperCase())}
                          aria-label="Big letter (1-2 characters)" />
                      </div>
                      <div className="control-row">
                        <label htmlFor="input-name">Name</label>
                        <input id="input-name" className="text-input" value={settings.name}
                          onChange={e=>set("name", e.target.value)}
                          aria-label="Name text" />
                      </div>
                    </div>

                    <div className="section">
                      <div className="section-title">Font</div>
                      <div className="font-grid" role="group" aria-label="Font selection">
                        {FONTS.map(f => (
                          <button
                            key={f.family}
                            className={`font-btn ${settings.fontFamily === f.family ? "active" : ""}`}
                            onClick={() => set("fontFamily", f.family)}
                            aria-pressed={settings.fontFamily === f.family}
                            aria-label={`Font: ${f.label}`}
                          >
                            <span className="font-preview" style={{fontFamily: `'${f.family}', sans-serif`, fontWeight: f.weight}}>Ag</span>
                            <span className="font-label">{f.label}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="section">
                      <div className="section-title">Shape</div>
                      <div className="shape-picker" role="group" aria-label="Shape selection">
                        {SHAPES.map(s => (
                          <button
                            key={s}
                            className={`shape-btn ${settings.shape===s?"active":""}`}
                            onClick={()=>set("shape",s)}
                            aria-pressed={settings.shape === s}
                          >{s}</button>
                        ))}
                      </div>
                    </div>

                    <div className="section">
                      <div className="section-title">Typography</div>
                      <SliderRow label="Letter size" value={settings.letterSize} min={300} max={700} step={10} onChange={v=>set("letterSize",v)} unit="px" />
                      <SliderRow label="Letter pos X" value={settings.letterOffsetX} min={-200} max={200} step={5} onChange={v=>set("letterOffsetX",v)} unit="px" />
                      <SliderRow label="Letter pos Y" value={settings.letterOffsetY} min={-200} max={200} step={5} onChange={v=>set("letterOffsetY",v)} unit="px" />
                      <SliderRow label="Name size" value={settings.nameSize} min={48} max={160} step={4} onChange={v=>set("nameSize",v)} unit="px" />
                      <SliderRow label="Vertical position" value={settings.nameOffsetY} min={-200} max={200} step={5} onChange={v=>set("nameOffsetY",v)} unit="px" />
                      <SliderRow label="Letter spacing" value={settings.letterSpacing} min={0} max={60} onChange={v=>set("letterSpacing",v)} unit="px" />
                      <SliderRow label="Outline width" value={settings.outlineWidth} min={0} max={8} onChange={v=>set("outlineWidth",v)} unit="px" />
                    </div>

                    <div className="section">
                      <div className="section-title">Texture</div>
                      <div className="shape-picker" role="group" aria-label="Texture selection">
                        {TEXTURES.map(t => (
                          <button
                            key={t}
                            className={`shape-btn ${settings.texture===t?"active":""}`}
                            onClick={()=>set("texture",t)}
                            aria-pressed={settings.texture === t}
                          >{t}</button>
                        ))}
                      </div>
                    </div>

                    <div className={`section ${noShape ? "section-disabled" : ""}`}>
                      <div className="section-title">Rings</div>
                      <div className="toggle-row">
                        <label>Outer ring</label>
                        <button className={`toggle ${settings.showRing1?"on":""}`} onClick={()=>set("showRing1",!settings.showRing1)} aria-pressed={settings.showRing1} aria-label="Toggle outer ring" />
                      </div>
                      {settings.showRing1 && <SliderRow label="Width" value={settings.ring1Width} min={1} max={20} onChange={v=>set("ring1Width",v)} unit="px" />}
                      <div className="toggle-row">
                        <label>Inner ring</label>
                        <button className={`toggle ${settings.showRing2?"on":""}`} onClick={()=>set("showRing2",!settings.showRing2)} aria-pressed={settings.showRing2} aria-label="Toggle inner ring" />
                      </div>
                      {settings.showRing2 && <>
                        <SliderRow label="Width" value={settings.ring2Width} min={1} max={12} onChange={v=>set("ring2Width",v)} unit="px" />
                        <SliderRow label="Gap from outer" value={settings.ring1Gap} min={4} max={60} onChange={v=>set("ring1Gap",v)} unit="px" />
                      </>}
                    </div>

                    <div className="section">
                      <div className="section-title">Glow</div>
                      <div className="toggle-row">
                        <label>Enable glow</label>
                        <button className={`toggle ${settings.glow?"on":""}`} onClick={()=>set("glow",!settings.glow)} aria-pressed={settings.glow} aria-label="Toggle glow" />
                      </div>
                      {settings.glow && <SliderRow label="Intensity" value={settings.glowIntensity} min={0.2} max={3} step={0.1} onChange={v=>set("glowIntensity",v)} />}
                    </div>
                  </>
                )}

                {tab === "colors" && (
                  <>
                    <div className={`section ${noShape ? "section-disabled" : ""}`}>
                      <div className="section-title">Background</div>
                      <ColorRow label="Top color" value={settings.bgTop} onChange={v=>set("bgTop",v)} />
                      <ColorRow label="Bottom color" value={settings.bgBot} onChange={v=>set("bgBot",v)} />
                      <div className="shape-picker" style={{marginTop: 8}}>
                        {["linear", "radial"].map(t => (
                          <button key={t} className={`shape-btn ${settings.bgGradientType===t?"active":""}`} onClick={()=>set("bgGradientType", t)} aria-pressed={settings.bgGradientType === t}>{t}</button>
                        ))}
                      </div>
                      {settings.bgGradientType === "linear" && (
                        <SliderRow label="Angle" value={settings.bgGradientAngle} min={0} max={360} onChange={v=>set("bgGradientAngle",v)} unit="°" />
                      )}
                      <SliderRow label="Color Stop" value={settings.bgGradientStop} min={10} max={100} onChange={v=>set("bgGradientStop",v)} unit="%" />
                    </div>
                    <div className="section">
                      <div className="section-title">Big Letter</div>
                      <ColorRow label="Gradient top" value={settings.kTop} onChange={v=>set("kTop",v)} />
                      <ColorRow label="Gradient bot" value={settings.kBot} onChange={v=>set("kBot",v)} />
                      <div className="shape-picker" style={{marginTop: 8}}>
                        {["linear", "radial"].map(t => (
                          <button key={t} className={`shape-btn ${settings.kGradientType===t?"active":""}`} onClick={()=>set("kGradientType", t)} aria-pressed={settings.kGradientType === t}>{t}</button>
                        ))}
                      </div>
                      {settings.kGradientType === "linear" && (
                        <SliderRow label="Angle" value={settings.kGradientAngle} min={0} max={360} onChange={v=>set("kGradientAngle",v)} unit="°" />
                      )}
                      <SliderRow label="Color Stop" value={settings.kGradientStop} min={10} max={100} onChange={v=>set("kGradientStop",v)} unit="%" />
                      {settings.glow && <div style={{marginTop: 8}}><ColorRow label="Glow color" value={settings.glowColor} onChange={v=>set("glowColor",v)} /></div>}
                    </div>
                    <div className="section">
                      <div className="section-title">Name Text</div>
                      <ColorRow label="Gradient top" value={settings.nameTop} onChange={v=>set("nameTop",v)} />
                      <ColorRow label="Gradient bot" value={settings.nameBot} onChange={v=>set("nameBot",v)} />
                      <div className="shape-picker" style={{marginTop: 8}}>
                        {["linear", "radial"].map(t => (
                          <button key={t} className={`shape-btn ${settings.nameGradientType===t?"active":""}`} onClick={()=>set("nameGradientType", t)} aria-pressed={settings.nameGradientType === t}>{t}</button>
                        ))}
                      </div>
                      {settings.nameGradientType === "linear" && (
                        <SliderRow label="Angle" value={settings.nameGradientAngle} min={0} max={360} onChange={v=>set("nameGradientAngle",v)} unit="°" />
                      )}
                      <SliderRow label="Color Stop" value={settings.nameGradientStop} min={10} max={100} onChange={v=>set("nameGradientStop",v)} unit="%" />
                      <div style={{marginTop: 8}}><ColorRow label="Outline color" value={settings.outlineColor} onChange={v=>set("outlineColor",v)} /></div>
                    </div>
                    <div className={`section ${noShape ? "section-disabled" : ""}`}>
                      <div className="section-title">Rings</div>
                      {settings.showRing1 && <ColorRow label="Outer ring" value={settings.ring1} onChange={v=>set("ring1",v)} />}
                      {settings.showRing2 && <ColorRow label="Inner ring" value={settings.ring2} onChange={v=>set("ring2",v)} />}
                      {!settings.showRing1 && !settings.showRing2 && (
                        <p style={{fontSize:11, color:"rgba(255,255,255,0.3)"}}>Both rings disabled — enable them in Design tab.</p>
                      )}
                    </div>
                  </>
                )}

                {tab === "export/import" && (
                  <div className="export-wrap">
                    <div className="export-section">
                      <div className="section-title">Download</div>
                      <p className="export-desc">Export your monogram as a high-res PNG (raster) or scalable SVG (vector, ideal for logos).</p>
                      <div className="png-row">
                        <button className="btn btn-primary export-btn" onClick={downloadPNG}>
                          <span className="btn-icon" aria-hidden="true">↓</span> Download PNG <span className="res-label">{pngRes}×{pngRes}</span>
                        </button>
                        <select className="res-select" value={pngRes} onChange={e => setPngRes(Number(e.target.value))} aria-label="PNG resolution">
                          <option value={700}>1×</option>
                          <option value={1400}>2×</option>
                          <option value={2800}>4×</option>
                        </select>
                      </div>
                      <button className="btn btn-secondary export-btn" onClick={downloadSVG}>
                        <span className="btn-icon" aria-hidden="true">↓</span> Download SVG
                      </button>
                    </div>
                    <div className="export-divider" />
                    <div className="export-section">
                      <div className="section-title">Share</div>
                      <p className="export-desc">Copy a URL with your full design encoded. Anyone with the link will see your exact settings.</p>
                      <button className="btn btn-share export-btn" onClick={shareURL}>
                        <span className="btn-icon" aria-hidden="true">⎘</span> Copy Share Link
                      </button>
                    </div>
                    <div className="export-divider" />
                    <div className="export-section">
                      <div className="section-title">Save / Load JSON</div>
                      <p className="export-desc">Export your settings as JSON to back them up, or import a previously saved file.</p>
                      <button className="btn btn-primary export-btn" onClick={exportJSON}>
                        <span className="btn-icon" aria-hidden="true">↓</span> Export JSON
                      </button>
                      <label className="btn btn-import export-btn" style={{cursor:"pointer"}}>
                        <span className="btn-icon" aria-hidden="true">↑</span> Import JSON
                        <input type="file" accept=".json,application/json" style={{display:"none"}} onChange={importJSON} aria-label="Import JSON file" />
                      </label>
                      {importError && <div className="import-error" role="alert">{importError}</div>}
                      {importSuccess && <div className="import-success" role="status">✓ Design loaded successfully!</div>}
                    </div>
                    <div className="export-divider" />
                    <div className="export-section">
                      <div className="section-title">Current Settings</div>
                      <div className="json-preview" aria-label="Current settings JSON" tabIndex={0}>
                      {JSON.stringify(settings, null, 2).replace(/"([a-zA-Z0-9_]+)":/g, '$1:')}
                      </div>
                    </div>
                  </div>
                )}

                {tab !== "export/import" && (
                <button 
                  className="randomize-global-btn"
                  onClick={handleRandomize}
                  style={{
                    width: '100%',
                    padding: '10px',
                    marginTop: '20px', /* Generous spacing from the sliders above it */
                    background: 'rgba(255, 200, 40, 0.06)',
                    border: '1px solid rgba(255, 200, 40, 0.2)',
                    borderRadius: '8px',
                    color: '#ffc828',
                    fontFamily: "'Poppins', sans-serif",
                    fontSize: '13px',
                    fontWeight: '600',
                    cursor: 'pointer',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    gap: '8px',
                    transition: 'all 0.2s ease'
                  }}
                  onMouseOver={(e) => e.currentTarget.style.background = 'rgba(255, 200, 40, 0.12)'}
                  onMouseOut={(e) => e.currentTarget.style.background = 'rgba(255, 200, 40, 0.06)'}
                >
                  🎲 Randomize Design
                </button>
                )}

                <a href="https://ko-fi.com/bankenichi" target="_blank" rel="noopener noreferrer" className="kofi-mobile" title="Support me on Ko-fi" aria-label="Support on Ko-fi">
                  <img src="https://raw.githubusercontent.com/bankenichi/Monogram-Logo-Generator/main/kofi%20logo.png" alt="Ko-fi" />
                </a>
              </div>
            </div>
          </div>

          {shareToast && (
            <div className="share-toast" role="status" aria-live="polite">
              ✓ Share link copied to clipboard!
            </div>
          )}
          {shareWarning && (
            <div className="share-warning" role="alert">
              <span>Link too long ({shareWarning.toLocaleString()} chars) — use JSON export instead.</span>
              <button className="warn-btn" onClick={() => { setShareWarning(null); exportJSON(); }}>Export JSON</button>
            </div>
          )}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
